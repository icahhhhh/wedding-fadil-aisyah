<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Buku Tamu Manual | Fadil & Aisyah</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,600&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --green: #3d5a3e; --green-light: #e6ede6; --bg: #f5f2ef; --green-mid: #5a7a5b; }
        body { font-family: 'Montserrat', sans-serif; background-color: var(--bg); }
        .font-serif { font-family: 'Playfair Display', serif; }
        .bg-green { background-color: var(--green); }
        .text-green { color: var(--green); }
        .border-green { border-color: var(--green); }

        #searchInput { -webkit-appearance: none; appearance: none; }
        #searchInput:focus { outline: none; border-color: var(--green); box-shadow: 0 0 0 3px rgba(61,90,62,0.10); }

        .tamu-card {
            transition: transform 0.15s ease, box-shadow 0.15s ease;
            min-height: 64px;
            display: flex;
            flex-direction: row;
            align-items: center;
            gap: 10px;
        }
        .tamu-card:active { transform: scale(0.985); }
        .tamu-card.hidden { display: none !important; }

        .btn-hadir-idle {
            background: var(--green-light);
            color: var(--green);
            border: 1.5px solid rgba(61,90,62,0.18);
        }
        .btn-hadir-active {
            background: var(--green);
            color: white;
            border: 1.5px solid var(--green);
            box-shadow: 0 2px 8px rgba(61,90,62,0.25);
        }

        .badge-vvip { background: #d0cece; color: #333; }
        .badge-vip  { background: #c9a227; color: white; }
        .badge-reg  { background: #e6ede6; color: var(--green); }
        .badge-new  { background: #fef3c7; color: #92600a; }

        .nama-tamu {
            font-size: 13px;
            line-height: 1.35;
            word-break: break-word;
            white-space: normal;
            overflow: visible;
        }

        .badge-status {
            font-size: 9px !important;
            padding: 2px 8px !important;
            border-radius: 6px !important;
        }

        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            margin-top: auto;
        }

        .spinner { border: 3px solid #e8e4e0; border-top: 3px solid var(--green); border-radius: 50%; width: 30px; height: 30px; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        #toast { transition: all 0.3s ease; opacity: 0; transform: translateY(16px); pointer-events: none; }
        #toast.show { opacity: 1; transform: translateY(0); }

        #addModal { transition: opacity 0.2s ease; }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #c5bfb9; border-radius: 10px; }

        /* Fab button */
        #fabAdd { box-shadow: 0 4px 20px rgba(61,90,62,0.4); }
        #fabAdd:active { transform: scale(0.94); }

        /* Header decoration */
        .header-leaf {
            position: absolute;
            opacity: 0.07;
            pointer-events: none;
        }

        /* Card hover shimmer on desktop */
        @media (hover: hover) {
            .tamu-card:hover { box-shadow: 0 4px 16px rgba(61,90,62,0.10); transform: translateY(-1px); }
        }
    </style>
</head>
<body class="min-h-screen">

<!-- HEADER -->
<div class="bg-green sticky top-0 z-40 shadow-md" style="background: linear-gradient(135deg, #2d4a2d 0%, #3d5a3e 60%, #4a6b4a 100%);">
    <div class="px-5 pt-5 pb-4 text-white text-center relative overflow-hidden">
        <!-- Ornamen dekoratif -->
        <div class="absolute inset-0 flex items-center justify-center opacity-5 pointer-events-none">
            <svg width="200" height="80" viewBox="0 0 200 80" fill="white">
                <path d="M10,40 Q50,10 100,40 Q150,70 190,40" stroke="white" stroke-width="1" fill="none" opacity="0.5"/>
                <path d="M10,45 Q50,15 100,45 Q150,75 190,45" stroke="white" stroke-width="0.5" fill="none"/>
            </svg>
        </div>
        <p class="text-[9px] uppercase tracking-[0.45em] opacity-60 mb-1.5"> Buku Tamu Manual </p>
        <h1 class="font-serif text-2xl tracking-tight">Fadil & Aisyah</h1>
    </div>
    <div id="statBar" class="hidden border-t border-white/15">
        <div class="text-center py-2.5">
            <p id="statTotal" class="text-xl font-bold text-white">0</p>
            <p class="text-[9px] uppercase tracking-widest text-white/55">Tamu Terdaftar</p>
        </div>
    </div>
</div>

<!-- SEARCH BAR -->
<div id="searchSection" class="hidden sticky top-[calc(var(--header-h,120px))] z-30 bg-stone-50/95 backdrop-blur-sm px-4 py-3 border-b border-stone-200/60">
    <div class="relative flex items-center bg-white rounded-2xl border border-stone-200/80 px-4 py-2.5 shadow-sm focus-within:border-green-700 focus-within:shadow-md transition-all">
        <svg class="w-4 h-4 text-stone-300 mr-3 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0"/>
        </svg>
        <input id="searchInput" type="text" placeholder="Cari nama tamu..." oninput="filterTamu(this.value)" autocomplete="off"
            class="flex-1 text-sm bg-transparent focus:outline-none text-stone-700 placeholder-stone-300">
        <button id="clearBtn" onclick="resetSearch()" class="hidden text-stone-300 hover:text-stone-500 ml-2 text-xl leading-none">&times;</button>
    </div>
    <div class="flex justify-between items-center mt-2 px-1">
        <p id="resultCount" class="text-[10px] text-stone-400 font-medium"></p>
        <button onclick="reloadData()" class="text-[10px] text-green underline opacity-60 flex items-center gap-1">
            <svg class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
            Refresh
        </button>
    </div>
</div>

<!-- MAIN CONTENT -->
<div class="max-w-lg mx-auto px-4 py-4 pb-24">

    <div id="loadingState" class="text-center py-16">
        <div class="spinner mx-auto mb-4"></div>
        <p class="text-sm text-stone-400">Memuat daftar tamu...</p>
    </div>

    <div id="errorState" class="hidden">
        <div class="bg-white rounded-3xl p-6 text-center border border-red-100 shadow-sm">
            <div class="w-12 h-12 bg-red-50 rounded-full flex items-center justify-center mx-auto mb-3">
                <svg class="w-6 h-6 text-red-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
            </div>
            <p class="font-bold text-stone-700 text-sm mb-1">Gagal memuat data</p>
            <p id="errorMsg" class="text-stone-400 text-xs mb-4"></p>
            <button onclick="reloadData()" class="bg-green text-white text-xs px-5 py-2 rounded-full">Coba Lagi</button>
        </div>
    </div>

    <div id="tamuContainer" class="hidden space-y-2.5"></div>

    <div id="emptySearch" class="hidden text-center py-12">
        <p class="text-stone-300 text-3xl mb-2">🔍</p>
        <p class="text-stone-500 text-sm font-medium">Nama tidak ditemukan</p>
        <p class="text-stone-400 text-xs mt-1 mb-4">Tamu ini belum ada di daftar.</p>
        <!-- Tombol tambah dari hasil pencarian kosong -->
        <button id="btnTambahDariSearch" onclick="bukaModalTambah()" class="hidden bg-green text-white text-xs px-5 py-2.5 rounded-full font-medium">
            + Tambah sebagai Tamu Baru
        </button>
    </div>

</div>

<!-- FAB TOMBOL TAMBAH TAMU -->
<button id="fabAdd" onclick="bukaModalTambah()"
    class="fixed bottom-6 right-6 z-40 bg-green text-white w-14 h-14 rounded-full flex items-center justify-center transition-all active:scale-95">
    <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v16m8-8H4"/>
    </svg>
</button>



<!-- MODAL TAMBAH TAMU BARU -->
<div id="addModal" class="hidden fixed inset-0 z-50 bg-black/40 flex items-end justify-center pb-6 px-4">
    <div class="bg-white rounded-3xl w-full max-w-sm p-6 shadow-2xl">
        <div class="flex justify-between items-center mb-4">
            <h3 class="font-bold text-stone-800 text-base">Tambah Tamu Baru</h3>
            <button onclick="tutupModalTambah()" class="text-stone-400 text-2xl leading-none">&times;</button>
        </div>
        <p class="text-stone-400 text-xs mb-4">Tamu akan ditambahkan ke daftar dan langsung ditandai <strong>Hadir</strong>.</p>

        <div class="mb-3">
            <label class="text-[10px] font-bold text-stone-500 uppercase tracking-wider block mb-1">Nama Tamu</label>
            <input id="inputNamaBaru" type="text" placeholder="Tulis nama lengkap..."
                class="w-full border border-stone-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-green-600 focus:ring-2 focus:ring-green-100">
        </div>

        <div class="mb-5">
            <label class="text-[10px] font-bold text-stone-500 uppercase tracking-wider block mb-1">Status Undangan</label>
            <select id="inputStatusBaru" class="w-full border border-stone-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-green-600 bg-white">
                <option value="Reguler">Reguler</option>
                <option value="VIP">VIP</option>
                <option value="VVIP">VVIP</option>
            </select>
        </div>

        <div class="flex gap-3">
            <button onclick="tutupModalTambah()" class="flex-1 py-3 rounded-2xl border border-stone-200 text-stone-600 text-sm font-medium">Batal</button>
            <button id="btnSimpanTamu" onclick="simpanTamuBaru()"
                class="flex-1 py-3 rounded-2xl bg-green text-white text-sm font-bold transition-opacity">
                Simpan & Hadir
            </button>
        </div>
    </div>
</div>

<!-- TOAST -->
<div id="toast" class="fixed bottom-6 left-1/2 -translate-x-1/2 z-50 bg-stone-800 text-white text-xs px-5 py-2.5 rounded-full shadow-lg whitespace-nowrap"></div>

<script>
    // ✅ URL BENAR — SAMA DENGAN SEMUA FILE LAINNYA
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwsuDPy2rb0yf-2r0WyYUL6rSwIbMbxj5kp7fEpinXbQ9FkaXoQA5x_h0wUdwavAqhZvg/exec';
    const STATUS_KEY = 'bukutamu_manual_status';

    let allTamu = [];
    let localStatus = {};
    let isSending = false;

    // ─── INIT ────────────────────────────────────────────
    window.onload = () => {
        localStatus = JSON.parse(localStorage.getItem(STATUS_KEY) || '{}');
        loadData();
    };

    // ─── LOAD DATA ───────────────────────────────────────
    async function loadData() {
        show('loadingState');
        hide('tamuContainer');
        hide('errorState');
        hide('searchSection');
        hide('statBar');

        try {
            const url = `${SCRIPT_URL}?type=get_tamu_manual&v=${Date.now()}`;
            const res = await fetch(url);
            const data = await res.json();

            if (!Array.isArray(data)) throw new Error('Format data tidak valid');
            allTamu = data;

            hide('loadingState');
            renderList();
            updateStats();
            show('tamuContainer');
            show('searchSection');
            show('statBar');
            updateResultCount();
        } catch (e) {
            hide('loadingState');
            show('errorState');
            document.getElementById('errorMsg').textContent = e.message || 'Periksa koneksi internet kamu.';
        }
    }

    function reloadData() { loadData(); }

    // ─── RENDER ──────────────────────────────────────────
    function renderList(list) {
        list = list || allTamu;
        const container = document.getElementById('tamuContainer');
        container.innerHTML = '';

      // ─── RENDER (Ganti isi loop di dalam list.forEach) ───────────────────
        list.forEach((t, i) => {
            const nama = t.nama || '';
            const status = localStatus[nama] || null;

            const hadirClass = status === 'hadir' ? 'btn-hadir-active' : 'btn-hadir-idle';
            const hadirLabel = status === 'hadir' ? '✓ Hadir' : 'Hadir';

            const s = (t.status || 'REG').toUpperCase();
            let badgeClass = 'badge-reg', badgeText = 'REG';
            if (s.includes('VVIP')) { badgeClass = 'badge-vvip'; badgeText = 'VVIP'; }
            else if (s.includes('VIP')) { badgeClass = 'badge-vip'; badgeText = 'VIP'; }

            const isNew = t.isNew || false;
            const newBadge = isNew ? `<span class="badge-new badge-status font-bold rounded-full uppercase ml-1">Baru</span>` : '';

            const cardOpacity = '';

            container.innerHTML += `
            <div class="tamu-card bg-white rounded-2xl px-3 py-3 shadow-sm border border-stone-100 flex items-center justify-between gap-2 ${cardOpacity}"
                data-nama="${escHtml(nama).toLowerCase()}" data-idx="${i}">
                
                <div class="flex-1 min-w-0 flex flex-col gap-1">
                    <p class="nama-tamu font-semibold text-stone-800">${escHtml(nama)}</p>
                    <div class="flex items-center gap-1">
                        <span class="${badgeClass} badge-status font-bold rounded-full uppercase">${badgeText}</span>
                        ${newBadge}
                    </div>
                </div>

                <div class="flex gap-1 flex-shrink-0">
                    <button onclick="setHadir('${escHtml(nama)}')"
                        class="${hadirClass} text-[10px] px-4 py-2 rounded-lg font-medium transition-all active:scale-95">${hadirLabel}</button>
                </div>
            </div>`;
        });
    }

    // ─── HADIR ───────────────────────────────────────────
    async function setHadir(nama) {
        if (isSending) return;

        if (localStatus[nama] === 'hadir') {
            delete localStatus[nama];
            saveLocal();
            refreshCard(nama);
            updateStats();
            showToast('Status direset: ' + nama);
            return;
        }

        localStatus[nama] = 'hadir';
        saveLocal();
        refreshCard(nama);
        updateStats();
        showToast('✓ Hadir: ' + nama);

        const tamu = allTamu.find(t => t.nama === nama);
        const statusUndangan = tamu ? (tamu.status || 'Reguler') : 'Reguler';
        sendAbsen(nama, statusUndangan);
    }

    // ─── MODAL TAMBAH TAMU BARU ──────────────────────────
    function bukaModalTambah() {
        // Pre-fill dari search jika ada
        const query = document.getElementById('searchInput').value.trim();
        if (query) {
            document.getElementById('inputNamaBaru').value = query;
        } else {
            document.getElementById('inputNamaBaru').value = '';
        }
        document.getElementById('inputStatusBaru').value = 'Reguler';
        show('addModal');
        document.getElementById('addModal').style.opacity = '0';
        setTimeout(() => {
            document.getElementById('addModal').style.opacity = '1';
            document.getElementById('inputNamaBaru').focus();
        }, 10);
    }

    function tutupModalTambah() {
        const m = document.getElementById('addModal');
        m.style.opacity = '0';
        setTimeout(() => hide('addModal'), 200);
    }

    async function simpanTamuBaru() {
        const nama = document.getElementById('inputNamaBaru').value.trim();
        const status = document.getElementById('inputStatusBaru').value;

        if (!nama) {
            document.getElementById('inputNamaBaru').focus();
            showToast('⚠ Nama tidak boleh kosong');
            return;
        }

        // Cek duplikat di list lokal
        const sudahAda = allTamu.some(t => t.nama.toLowerCase() === nama.toLowerCase());
        if (sudahAda) {
            tutupModalTambah();
            showToast('⚠ ' + nama + ' sudah ada di daftar');
            // Scroll ke nama tersebut dan tandai hadir
            const namaAsli = allTamu.find(t => t.nama.toLowerCase() === nama.toLowerCase())?.nama;
            if (namaAsli) setHadir(namaAsli);
            return;
        }

        // Disable tombol
        const btn = document.getElementById('btnSimpanTamu');
        btn.textContent = 'Menyimpan...';
        btn.disabled = true;

        try {
            // Kirim ke Apps Script — tambah ke daftar tamu + langsung absen
            const url = `${SCRIPT_URL}?type=add_tamu_manual&nama=${encodeURIComponent(nama)}&status=${encodeURIComponent(status)}`;
            await fetch(url);
        } catch(e) {
            // Silent fail — tetap tambah ke lokal
        }

        // Tambah ke array lokal
        allTamu.unshift({ nama, status, isNew: true });

        // Tandai hadir langsung
        localStatus[nama] = 'hadir';
        saveLocal();

        tutupModalTambah();
        resetSearch();

        // Re-render dan update
        renderList();
        updateStats();
        show('tamuContainer');
        showToast('✓ Tamu baru ditambahkan: ' + nama);

        btn.textContent = 'Simpan & Hadir';
        btn.disabled = false;
    }

    // ─── KIRIM ABSEN KE SHEETS ───────────────────────────
    async function sendAbsen(nama, status) {
        isSending = true;
        try {
            const url = `${SCRIPT_URL}?type=absen&nama=${encodeURIComponent(nama)}&status=${encodeURIComponent(status)}`;
            await fetch(url);
        } catch (e) {
            // Silent fail
        } finally {
            isSending = false;
        }
    }

    // ─── REFRESH SINGLE CARD ────────────────────────────
    function refreshCard(nama) {
        const cards = document.querySelectorAll('.tamu-card');
        cards.forEach(card => {
            if (card.dataset.nama === nama.toLowerCase()) {
                const s = localStatus[nama] || null;
                const btn = card.querySelector('button');
                btn.textContent = s === 'hadir' ? '✓ Hadir' : 'Hadir';
                btn.className = (s === 'hadir' ? 'btn-hadir-active' : 'btn-hadir-idle') + ' text-[10px] px-4 py-2 rounded-lg font-medium transition-all active:scale-95';
                card.classList.remove('sudah-hadir');
            }
        });
    }

    // ─── STATS ───────────────────────────────────────────
    function updateStats() {
        document.getElementById('statTotal').textContent = allTamu.length;
    }

    // ─── SEARCH / FILTER ────────────────────────────────
    function filterTamu(q) {
        const query = q.toLowerCase().trim();
        const cards = document.querySelectorAll('.tamu-card');
        let visible = 0;
        cards.forEach(card => {
            const match = !query || card.dataset.nama.includes(query);
            card.classList.toggle('hidden', !match);
            if (match) visible++;
        });
        document.getElementById('clearBtn').classList.toggle('hidden', !q);

        const emptyDiv = document.getElementById('emptySearch');
        const btnTambah = document.getElementById('btnTambahDariSearch');

        if (visible === 0 && query) {
            show('emptySearch');
            btnTambah.classList.remove('hidden'); // Tampilkan tombol tambah
        } else {
            hide('emptySearch');
            btnTambah.classList.add('hidden');
        }
        updateResultCount(query ? visible : null);
    }

    function resetSearch() {
        document.getElementById('searchInput').value = '';
        filterTamu('');
    }

    function updateResultCount(count) {
        const el = document.getElementById('resultCount');
        el.textContent = count != null
            ? `${count} dari ${allTamu.length} tamu ditemukan`
            : `${allTamu.length} tamu terdaftar`;
    }

    // ─── HELPERS ─────────────────────────────────────────
    function saveLocal() { localStorage.setItem(STATUS_KEY, JSON.stringify(localStatus)); }
    function show(id) { document.getElementById(id)?.classList.remove('hidden'); }
    function hide(id) { document.getElementById(id)?.classList.add('hidden'); }
    function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }

    let toastTimer;
    function showToast(msg) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.classList.add('show');
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
    }
</script>
</body>
</html>
