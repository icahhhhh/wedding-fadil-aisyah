<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Dashboard | Fadil & Aisyah</title>

    <meta property="og:title" content="Wedding Dashboard Fadil & Aisyah">
    <meta property="og:description" content="Guest Management System for Fadil & Aisyah">
    <meta property="og:image" content="logo.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Montserrat', sans-serif; background-color: #f4f1ee; overflow-x: hidden; }
        .font-serif { font-family: 'Playfair Display', serif; }
        .card-shadow { box-shadow: 0 10px 25px -5px rgba(74, 93, 74, 0.1), 0 8px 10px -6px rgba(74, 93, 74, 0.1); }
        .bg-stone-green { background-color: #4a5d4a; }
        .text-stone-green { color: #4a5d4a; }
        
        #fullOverlay { 
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1); 
            transform: translateX(100%);
            will-change: transform;
        }
        #fullOverlay.active { transform: translateX(0); }

        .iframe-loader {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: -1;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(74, 93, 74, 0.1);
            border-top-color: #4a5d4a;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="p-4 md:p-8 min-h-screen">

    <div class="max-w-4xl mx-auto">
        <!-- Header -->
        <header class="flex justify-between items-center mb-10">
            <div>
                <p class="text-[10px] uppercase tracking-[0.4em] text-stone-400 mb-1">Wedding Management</p>
                <h1 class="font-serif text-3xl text-stone-green font-bold">Admin Dashboard</h1>
            </div>
            <div class="w-14 h-14 bg-white rounded-full flex items-center justify-center card-shadow border border-stone-200 overflow-hidden">
                <img src="logo.png" alt="FA" class="w-10 h-10 object-cover" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
                <span class="text-stone-green text-xl font-bold hidden">FA</span>
            </div>
        </header>

        <!-- Quick Statistics -->
        <div class="grid grid-cols-2 gap-4 mb-8">
            <div class="bg-white p-5 rounded-[2rem] card-shadow border border-stone-100 text-center">
                <p class="text-[9px] font-bold uppercase tracking-widest text-stone-400 mb-1">Total Guests</p>
                <p id="totalTamu" class="text-2xl font-serif text-stone-green font-bold">--</p>
            </div>
            <div class="bg-white p-5 rounded-[2rem] card-shadow border border-stone-100 text-center">
                <p class="text-[9px] font-bold uppercase tracking-widest text-stone-400 mb-1">Checked-in</p>
                <p id="totalHadir" class="text-2xl font-serif text-stone-green font-bold">--</p>
            </div>
        </div>

        <!-- Main Menu -->
        <h2 class="text-[10px] font-bold uppercase tracking-[0.3em] text-stone-400 mb-4 px-2">Main Menu</h2>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
            <button onclick="openFullPage('scanner.html')" class="group bg-stone-green p-6 rounded-[2rem] text-white flex items-center justify-between transition-all hover:brightness-110 active:scale-95 shadow-xl shadow-stone-green/20">
                <div class="text-left">
                    <p class="text-[9px] uppercase tracking-widest opacity-70 mb-1">Front Desk</p>
                    <h3 class="font-serif text-xl">Guest Scanner</h3>
                </div>
                <div class="w-12 h-12 bg-white/20 rounded-full flex items-center justify-center text-xl transition-transform group-hover:rotate-12">📸</div>
            </button>

            <button onclick="openFullPage('generator.html')" class="group bg-white p-6 rounded-[2rem] text-stone-green flex items-center justify-between card-shadow border border-stone-100 transition-all hover:bg-stone-50 active:scale-95">
                <div class="text-left">
                    <p class="text-[9px] uppercase tracking-widest text-stone-400 mb-1">Invitation</p>
                    <h3 class="font-serif text-xl">Link Generator</h3>
                </div>
                <div class="w-12 h-12 bg-stone-green/10 rounded-full flex items-center justify-center text-xl transition-transform group-hover:scale-110">✍️</div>
            </button>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-10">
            <button onclick="openFullPage('rekap.html')" class="group bg-white p-6 rounded-[2rem] text-stone-green flex items-center justify-between card-shadow border border-stone-100 transition-all hover:bg-stone-50 active:scale-95">
                <div class="text-left">
                    <p class="text-[9px] uppercase tracking-widest text-stone-400 mb-1">Records</p>
                    <h3 class="font-serif text-xl">Attendance Summary</h3>
                </div>
                <div class="w-12 h-12 bg-stone-green/10 rounded-full flex items-center justify-center text-xl transition-transform group-hover:-translate-y-1">📋</div>
            </button>

            <button onclick="openFullPage('wish-gallery.html')" class="group bg-white p-6 rounded-[2rem] text-stone-green flex items-center justify-between card-shadow border border-stone-100 transition-all hover:bg-stone-50 active:scale-95">
                <div class="text-left">
                    <p class="text-[9px] uppercase tracking-widest text-stone-400 mb-1">Guest Sentiments</p>
                    <h3 class="font-serif text-xl">Wishes Gallery</h3>
                </div>
                <div class="w-12 h-12 bg-stone-green/10 rounded-full flex items-center justify-center text-xl transition-transform group-hover:scale-110">✨</div>
            </button>
        </div>

        <!-- Analytics Section -->
        <h2 class="text-[10px] font-bold uppercase tracking-[0.3em] text-stone-400 mb-4 px-2">Analytics</h2>
        <div class="mb-10">
            <button onclick="openFullPage('dashboard-kehadiran-tamu.html')" class="w-full bg-white p-8 rounded-[2.5rem] card-shadow border border-stone-100 flex flex-col md:flex-row items-center gap-6 transition-all hover:bg-stone-50 group active:scale-[0.98]">
                <div class="w-16 h-16 bg-stone-green/10 rounded-full flex items-center justify-center text-3xl group-hover:scale-110 transition-transform">📊</div>
                <div class="text-center md:text-left flex-1">
                    <h3 class="font-serif text-2xl text-stone-green mb-1 font-bold">Attendance Analytics</h3>
                    <p class="text-xs text-stone-400 leading-relaxed">Real-time statistics on guest arrival flow and category proportions.</p>
                </div>
                <div class="bg-stone-green text-white text-[10px] font-bold uppercase tracking-widest px-8 py-3 rounded-full shadow-lg">View Details</div>
            </button>
        </div>

        <!-- External Link -->
        <h2 class="text-[10px] font-bold uppercase tracking-[0.3em] text-stone-400 mb-4 px-2">Live Web</h2>
        <div class="bg-white p-8 rounded-[2.5rem] card-shadow border border-stone-100 flex flex-col md:flex-row items-center gap-6">
            <div class="w-16 h-16 bg-stone-green/5 rounded-full flex items-center justify-center text-3xl">📱</div>
            <div class="text-center md:text-left flex-1">
                <h3 class="font-serif text-2xl text-stone-green mb-1 font-bold">Main Invitation</h3>
                <p class="text-xs text-stone-400 mb-4">Direct access to the public wedding invitation page.</p>
                <a href="index.html" target="_blank" class="inline-block bg-stone-green text-white text-[10px] font-bold uppercase tracking-widest px-10 py-3 rounded-full shadow-lg">Open Invitation Page</a>
            </div>
        </div>

    </div>

    <!-- FULL PAGE OVERLAY -->
    <div id="fullOverlay" class="fixed inset-0 bg-stone-light z-[100] flex flex-col">
        <div class="bg-white px-5 py-4 relative flex items-center border-b border-stone-200 card-shadow z-10">
            <button onclick="closeFullPage()" class="relative z-20 text-stone-green text-[10px] font-bold flex items-center gap-2 uppercase tracking-widest active:scale-95">
                <span class="text-lg">←</span> BACK
            </button>
            <div class="absolute inset-x-0 text-center pointer-events-none">
                <span id="overlayTitle" class="text-[10px] font-bold uppercase tracking-widest text-stone-400">MENU</span>
            </div>
        </div>
        
        <div class="iframe-loader">
            <div class="spinner"></div>
            <p class="text-[10px] text-stone-400 uppercase tracking-widest mt-4">Loading Content...</p>
        </div>

        <iframe id="pageFrame" src="" class="w-full flex-grow border-none bg-transparent opacity-0 transition-opacity duration-300"></iframe>
    </div>

    <footer class="mt-16 mb-10 text-center text-stone-400 text-[10px] uppercase tracking-[0.4em] leading-loose">
       #AIfinallyFAundlove<br>   
       &copy; Powered by Fadil & Aisyah
    </footer>

    <script>
        const overlay = document.getElementById('fullOverlay');
        const iframe = document.getElementById('pageFrame');
        const titleText = document.getElementById('overlayTitle');

        function openFullPage(url) {
            if(url.includes('generator')) titleText.innerText = "Invitation Generator";
            else if(url.includes('scanner')) titleText.innerText = "Guest Scanner";
            else if(url.includes('rekap_ucapan')) titleText.innerText = "Wishes Gallery";
            else if(url.includes('rekap')) titleText.innerText = "Data Recap";
            else if(url.includes('dashboard-kehadiran-tamu')) titleText.innerText = "Analytics Dashboard";
            else titleText.innerText = "System Menu";

            overlay.classList.add('active');
            document.body.style.overflow = 'hidden';
            
            setTimeout(() => {
                iframe.style.opacity = '0';
                iframe.src = url;
            }, 100);
        }

        iframe.onload = function() {
            iframe.style.opacity = '1';
        };

        function closeFullPage() {
            overlay.classList.remove('active');
            iframe.style.opacity = '0';
            setTimeout(() => {
                iframe.src = "";
            }, 300);
            document.body.style.overflow = 'auto';
            updateQuickStats();
        }

        const scriptURL = 'https://script.google.com/macros/s/AKfycbwsuDPy2rb0yf-2r0WyYUL6rSwIbMbxj5kp7fEpinXbQ9FkaXoQA5x_h0wUdwavAqhZvg/exec';

        async function updateQuickStats() {
            try {
                const [resTamu, resAbsen] = await Promise.all([
                    fetch(`${scriptURL}?type=get_tamu_manual&v=${Date.now()}`),
                    fetch(`${scriptURL}?type=get_absen&v=${Date.now()}`)
                ]);
                
                const listTamu = await resTamu.json();
                const listAbsen = await resAbsen.json();
                
                document.getElementById('totalTamu').innerText = listTamu.length;
                document.getElementById('totalHadir').innerText = listAbsen.length;
            } catch (e) {
                console.error("Stats sync failed:", e);
            }
        }

        document.addEventListener('DOMContentLoaded', updateQuickStats);
    </script>
</body>
</html>
