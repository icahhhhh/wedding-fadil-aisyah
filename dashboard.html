<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Admin | Fadil & Aisyah</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Montserrat', sans-serif; background-color: #f4f1ee; overflow-x: hidden; }
        .font-serif { font-family: 'Playfair Display', serif; }
        .card-shadow { box-shadow: 0 10px 25px -5px rgba(74, 93, 74, 0.1), 0 8px 10px -6px rgba(74, 93, 74, 0.1); }
        .bg-stone-green { background-color: #4a5d4a; }
        .text-stone-green { color: #4a5d4a; }
        
        /* FULL OVERLAY ANIMATION */
        #fullOverlay { 
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
            transform: translateX(100%); 
        }
        #fullOverlay.active { 
            transform: translateX(0); 
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-6">

  <!-- Header Dashboard -->
<div class="text-center mt-6 mb-10 px-4 flex flex-col items-center">
    <!-- Logo Monogram Baru -->
    <div class="mb-4">
        <img src="logo.png" alt="Logo Fadil & Aisyah" class="w-16 h-16 object-contain opacity-90">
    </div>

    <!-- Ornamen Garis Halus -->
    <div class="flex items-center justify-center gap-3 mb-3 w-full">
        <div class="h-[1px] w-8 bg-stone-200"></div>
        <span class="text-[10px] tracking-[0.4em] text-stone-400 uppercase font-light">The Wedding of</span>
        <div class="h-[1px] w-8 bg-stone-200"></div>
    </div>

    <!-- Nama Utama -->
    <h1 class="font-serif text-4xl text-stone-green mb-2 tracking-tight">
        Fadil & Aisyah
    </h1>

    <!-- Subtitle -->
    <p class="text-[9px] uppercase tracking-[0.3em] text-stone-500 opacity-80">
        Wedding Management Dashboard
    </p>
</div>

    <!-- Menu Grid -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 w-full max-w-2xl">
        
        <!-- Undangan Web -->
        <a href="https://wedding-fadil-aisyah.vercel.app/" target="_blank" class="bg-white p-8 rounded-3xl card-shadow flex flex-col items-center group transition-all hover:-translate-y-1">
            <div class="w-16 h-16 bg-stone-100 rounded-2xl flex items-center justify-center mb-4 group-hover:bg-stone-green transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-stone-600 group-hover:text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.657 0 3-4.03 3-9s-1.343-9-3-9m0 18c-1.657 0-3-4.03-3-9s1.343-9 3-9m-9 9a9 9 0 019-9" /></svg>
            </div>
            <h2 class="font-bold text-stone-800">Undangan Web</h2>
        </a>

        <!-- Generator WA -->
        <button onclick="openFullPage('generator.html')" class="bg-white p-8 rounded-3xl card-shadow flex flex-col items-center group transition-all hover:-translate-y-1 text-center">
            <div class="w-16 h-16 bg-stone-100 rounded-2xl flex items-center justify-center mb-4 group-hover:bg-stone-green transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-stone-600 group-hover:text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4" /></svg>
            </div>
            <h2 class="font-bold text-stone-800">Generator WA</h2>
        </button>

        <!-- Scanner QR -->
        <button onclick="openFullPage('scanner.html')" class="bg-white p-8 rounded-3xl card-shadow flex flex-col items-center group transition-all hover:-translate-y-1 text-center">
            <div class="w-16 h-16 bg-stone-100 rounded-2xl flex items-center justify-center mb-4 group-hover:bg-stone-green transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-stone-600 group-hover:text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3m0 0h.01M12 12h4.01M16 20h4M4 12h4m12 0h.01M5 8h2a1 1 0 001-1V5a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1zm12 0h2a1 1 0 001-1V5a1 1 0 00-1-1h-2a1 1 0 00-1 1v2a1 1 0 001 1zM5 17h2a1 1 0 001-1v-2a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1z" /></svg>
            </div>
            <h2 class="font-bold text-stone-800">Scanner QR</h2>
        </button>

        <!-- Rekap Data -->
        <button onclick="openFullPage('rekap.html')" class="bg-white p-8 rounded-3xl card-shadow flex flex-col items-center group transition-all hover:-translate-y-1 text-center">
            <div class="w-16 h-16 bg-stone-100 rounded-2xl flex items-center justify-center mb-4 group-hover:bg-stone-green transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-stone-600 group-hover:text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01" /></svg>
            </div>
            <h2 class="font-bold text-stone-800">Rekap Data</h2>
        </button>

    </div>

    <!-- FULL OVERLAY ELEMENT -->
    <div id="fullOverlay" class="fixed inset-0 bg-white z-[200] flex flex-col">
        <!-- Header Overlay -->
        <div class="bg-stone-green p-5 text-white flex justify-between items-center shadow-md">
            <button onclick="closeFullPage()" class="text-sm font-bold flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" /></svg>
                KEMBALI
            </button>
            <span id="overlayTitle" class="text-xs font-bold uppercase tracking-widest">Menu</span>
            <div class="w-10"></div> <!-- Spacer agar judul di tengah -->
        </div>
        
        <!-- Iframe Content -->
        <iframe id="pageFrame" src="" class="w-full flex-grow border-none"></iframe>
    </div>

    <footer class="mt-16 text-center text-stone-400 text-[10px] uppercase tracking-widest">
       #AIfinallyFAundlove<br>   &copy; Fadil & Aisyah Wedding Team
    </footer>

    <script>
        const overlay = document.getElementById('fullOverlay');
        const iframe = document.getElementById('pageFrame');
        const titleText = document.getElementById('overlayTitle');

        function openFullPage(url) {
            // Set judul header overlay
            if(url.includes('generator')) titleText.innerText = "Generator Undangan";
            if(url.includes('scanner')) titleText.innerText = "Scanner Tamu";
            if(url.includes('rekap')) titleText.innerText = "Rekap Data";

            iframe.src = url;
            overlay.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeFullPage() {
            overlay.classList.remove('active');
            setTimeout(() => {
                iframe.src = ""; // Reset iframe
            }, 400);
            document.body.style.overflow = 'auto';
        }
    </script>
</body>
</html>
