<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generator VIP | Fadil & Aisyah</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,600&family=Inter:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #5c6351; --accent: #8c947e; --bg: #f4f5f0; --text: #333; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 15px; }
        .container { background: white; max-width: 100%; margin: 0 auto; padding: 25px 15px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border: 1px solid #e0e2db; box-sizing: border-box; }
        h1 { font-family: 'Playfair Display', serif; font-size: 1.8rem; color: var(--primary); text-align: center; margin: 0 0 5px 0; }
        .subtitle { text-align: center; font-size: 0.7rem; letter-spacing: 2px; text-transform: uppercase; color: var(--accent); margin-bottom: 30px; }
        .input-section { margin-bottom: 20px; }
        label { display: block; font-size: 0.7rem; font-weight: bold; margin-bottom: 6px; color: var(--primary); text-transform: uppercase; }
        input, textarea { width: 100%; padding: 14px; border: 1px solid #ddd; border-radius: 8px; background: #fafafa; font-family: inherit; font-size: 16px; box-sizing: border-box; outline: none; }
        button { width: 100%; padding: 16px; background: var(--primary); color: white; border: none; border-radius: 8px; letter-spacing: 1px; cursor: pointer; font-weight: bold; font-size: 1rem; }
        .guest-card { display: flex; flex-direction: column; gap: 10px; padding: 15px; background: #fff; border: 1px solid #eee; border-radius: 8px; margin-top: 15px; }
        .guest-name { font-family: 'Playfair Display', serif; font-size: 1.2rem; color: var(--primary); }
        .vip-badge { background: #d4a373; color: white; font-size: 0.6rem; padding: 2px 6px; border-radius: 4px; vertical-align: middle; margin-left: 5px; }
        .btn-wa { background: #25D366; color: white; text-decoration: none; padding: 12px; text-align: center; font-size: 0.9rem; font-weight: bold; border-radius: 6px; display: block; }
        .vip-option { display: flex; align-items: center; gap: 8px; font-size: 0.8rem; color: var(--primary); margin-top: 5px; }
        .vip-option input { width: auto; }
    </style>
</head>
<body>

<div class="container">
    <!-- Tambahkan ini di dalam <div class="container"> paling atas -->
<div style="text-align: right; margin-bottom: 20px;">
    <a href="rekap generator.html" style="text-decoration: none; font-size: 0.7rem; color: var(--primary); border: 1px solid var(--primary); padding: 5px 10px; border-radius: 4px;">
        LIHAT REKAP TERKIRIM →
    </a>
</div> 
    <h1>Fadil & Aisyah</h1>
    <div class="subtitle">Invitation Generator VIP</div>

    <div class="input-section">
        <label>URL Undangan Utama</label>
        <input type="text" id="baseUrl" value="https://wedding-fadil-aisyah.vercel.app">
    </div>

    <div class="input-section">
        <label>Daftar Tamu (Nama, NomorWA)</label>
        <textarea id="dataInput" rows="5" placeholder="Icah, 6285653320232"></textarea>
    </div>

    <button onclick="generateLinks()">GENERATE LIST</button>
    <div id="resultList"></div>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbzkZj1Lx7NwonhYagVGlJA2UHycP3K7QbTB5Cff6WYnCUH173yp8liIFGPI2-P3bP8W/exec';

function generateLinks() {
        const url = document.getElementById('baseUrl').value.trim();
        const input = document.getElementById('dataInput').value.trim();
        const container = document.getElementById('resultList');
        if(!input) return alert("Masukkan daftar tamu!");

        const lines = input.split('\n');
        let html = '';

        lines.forEach((line, index) => {
            const parts = line.split(',');
            const nama = parts[0] ? parts[0].trim() : "";
            
            if (nama !== "") {
                let rawWa = parts[1] ? parts[1].trim().replace(/\D/g, '') : ""; 
                if (rawWa.startsWith('0')) { rawWa = '62' + rawWa.substring(1); }
                
                html += `
                    <div class="guest-card" id="card-${index}" style="display: flex; flex-direction: row; justify-content: space-between; align-items: center; padding: 15px; border-bottom: 1px solid #eee;">
                        <div style="flex: 1;">
                            <div class="guest-name" style="font-size: 1.1rem; font-weight: bold; color: var(--primary);">${nama}</div>
                            <div class="vip-option" style="margin-top: 4px;">
                                <input type="checkbox" id="vip-${index}"> <label for="vip-${index}" style="font-size: 0.7rem; color: #888;">Set VIP</label>
                            </div>
                        </div>
                        <div style="display: flex; gap: 10px;">
                            <!-- Tombol WhatsApp -->
                            <button onclick="prosesKirim('${nama}', '${rawWa}', ${index}, 'wa')" style="background: #25D366; border: none; padding: 8px; border-radius: 8px; cursor: pointer; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center;">
                                <svg viewBox="0 0 24 24" width="20" height="20" fill="white"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
                            </button>
                            <!-- Tombol Salin -->
                            <button onclick="prosesKirim('${nama}', '${rawWa}', ${index}, 'salin')" style="background: #95a5a6; border: none; padding: 8px; border-radius: 8px; cursor: pointer; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center;">
                                <svg viewBox="0 0 24 24" width="20" height="20" fill="white"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>
                            </button>
                            <!-- Tombol Share Sosmed -->
                            <button onclick="prosesKirim('${nama}', '${rawWa}', ${index}, 'share')" style="background: #3498db; border: none; padding: 8px; border-radius: 8px; cursor: pointer; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center;">
                                <svg viewBox="0 0 24 24" width="20" height="20" fill="white"><path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92s2.92-1.31 2.92-2.92c0-1.61-1.31-2.92-2.92-2.92z"/></svg>
                            </button>
                        </div>
                    </div>
                `;
            }
        });
        container.innerHTML = html;
    }

   async function prosesKirim(nama, wa, index, aksi) {
        const isVIP = document.getElementById(`vip-${index}`).checked;
        const statusTamu = isVIP ? "VIP" : "Reguler";
        const urlBase = document.getElementById('baseUrl').value.trim();
        
        const linkPersonal = `${urlBase}?to=${encodeURIComponent(nama).replace(/%20/g, '+')}&s=${statusTamu}`;
        const labelVIP = isVIP ? "*[TAMU VIP]*\n" : "";
        
        const message = `Assalamu’alaikum Warahmatullahi Wabarakatuh\n\n${labelVIP}Kepada Yth.\nBapak/Ibu/Saudara/i\n*${nama}*\n___\n\nTanpa mengurangi rasa hormat, perkenankan kami mengundang Bapak/Ibu/Saudara/i untuk menghadiri hari bahagia kami:\n\n✨ THE WEDDING OF FADIL & AISYAH ✨\n\nKehadiran Anda adalah kado terindah bagi kami. Mengingat keterbatasan jarak dan waktu, izinkan e-invitation ini menjadi jembatan silaturahmi sebagai pengganti undangan resmi kami.\n\nSilakan akses tautan di bawah ini untuk detail acara, lokasi, dan waktu:\n${linkPersonal}\n\nMerupakan suatu kehormatan apabila Bapak/Ibu/Saudara/i berkenan hadir dan memberikan doa restu bagi perjalanan ibadah panjang kami.\n\nTerima kasih atas doa dan perhatiannya.\n\nWassalamu’alaikum Warahmatullahi Wabarakatuh\n\nHormat kami,\nAisyah & Fadil\n#AIfinallyFAundlove\n\n____\n\nSpread your happiness with us`;

        // 1. Logika Aksi
        if (aksi === 'wa') {
            const waUrl = wa ? `https://api.whatsapp.com/send?phone=${wa}&text=${encodeURIComponent(message)}` : `https://api.whatsapp.com/send?text=${encodeURIComponent(message)}`;
            window.open(waUrl, '_blank');
        } 
        else if (aksi === 'salin') {
            try {
                await navigator.clipboard.writeText(message);
                alert("Pesan berhasil disalin untuk " + nama);
            } catch (err) {
                alert("Gagal menyalin teks.");
            }
        } 
        else if (aksi === 'share') {
            if (navigator.share) {
                navigator.share({ title: 'Undangan Pernikahan', text: message }).catch(() => {});
            } else {
                alert("Browser tidak mendukung fitur share. Silakan salin pesan manual.");
            }
        }

        // 2. Simpan ke Google Sheets
        const finalURL = `${scriptURL}?type=add_list&nama=${encodeURIComponent(nama)}&wa=${encodeURIComponent(wa || "Manual")}&status=${statusTamu}`;
        fetch(finalURL, { method: 'GET', mode: 'no-cors' });

        // 3. Efek visual kartu (Tandai sudah diproses)
        document.getElementById(`card-${index}`).style.opacity = "0.5";
    }
</script>
</body>
</html>
