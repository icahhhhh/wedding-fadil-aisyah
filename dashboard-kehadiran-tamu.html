<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance Analytics | Fadil & Aisyah</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        stone: { green: '#4a5d4a', light: '#f4f1ee', dark: '#1c1917', border: '#e0e2db' },
                        gold: '#d4af37'
                    },
                    fontFamily: { serif: ['"Playfair Display"', 'serif'], sans: ['Montserrat', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        body { background-color: #f4f1ee; color: #1c1917; }
        .glass-card { background: rgba(255, 255, 255, 0.9); border: 1px solid rgba(74, 93, 74, 0.1); backdrop-filter: blur(10px); }
        .chart-container { position: relative; height: 300px; width: 100%; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #4a5d4a; border-radius: 10px; }
        
        .loading-spin {
            animation: spin 1s linear infinite;
        }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        
        .fade-in { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Custom scrollbar for table */
        .custom-scrollbar::-webkit-scrollbar { height: 4px; width: 4px; }
    </style>
</head>
<body class="p-4 md:p-8 min-h-screen font-sans pb-20 text-stone-dark">

    <div class="max-w-6xl mx-auto fade-in">
        <!-- Header Section -->
        <header class="flex flex-col items-center gap-6 mb-10 px-2">
            <div class="w-full flex justify-end items-center">
                <button onclick="refreshData()" id="refreshBtn" class="bg-white px-6 py-3 rounded-full shadow-sm border border-stone-200 text-[10px] font-bold uppercase tracking-widest text-stone-green hover:bg-stone-50 transition-all flex items-center gap-2 group">
                    <svg id="refreshIcon" class="w-3 h-3 transition-transform group-active:rotate-180" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path>
                    </svg>
                    Sync Data
                </button>
            </div>

            <div class="text-center relative w-full">
                <p class="text-[10px] font-bold text-stone-400 uppercase tracking-[0.5em] mb-2">Wedding Analytics</p>
                <h1 class="font-serif text-3xl text-stone-green font-bold uppercase tracking-tight">Attendance Dashboard</h1>
            </div>
        </header>

        <!-- KPI Summary Cards -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
            <div class="glass-card p-6 rounded-[2rem] text-center shadow-xl shadow-stone-green/5">
                <p class="text-[9px] font-bold uppercase tracking-widest text-stone-400 mb-2">Invited</p>
                <h3 id="statTotal" class="text-3xl font-serif text-stone-green">0</h3>
            </div>
            <div class="glass-card p-6 rounded-[2rem] text-center shadow-xl shadow-stone-green/5">
                <p class="text-[9px] font-bold uppercase tracking-widest text-stone-400 mb-2">Present</p>
                <h3 id="statHadir" class="text-3xl font-serif text-stone-green">0</h3>
            </div>
            <div class="glass-card p-6 rounded-[2rem] text-center shadow-xl shadow-stone-green/5">
                <p class="text-[9px] font-bold uppercase tracking-widest text-stone-400 mb-2">Pending</p>
                <h3 id="statBelum" class="text-3xl font-serif text-stone-400">0</h3>
            </div>
            <div class="glass-card p-6 rounded-[2rem] text-center shadow-xl shadow-stone-green/5">
                <p class="text-[9px] font-bold uppercase tracking-widest text-stone-400 mb-2">Rate</p>
                <h3 id="statPersen" class="text-3xl font-serif text-stone-green">0%</h3>
            </div>
        </div>

        <!-- Charts Grid -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-10">
            <div class="glass-card p-8 rounded-[2.5rem] shadow-xl shadow-stone-green/5">
                <h3 class="text-sm font-bold uppercase tracking-widest text-stone-green mb-6 border-b border-stone-100 pb-4">Guest Distribution</h3>
                <div class="chart-container">
                    <canvas id="categoryChart"></canvas>
                </div>
            </div>

            <div class="glass-card p-8 rounded-[2.5rem] shadow-xl shadow-stone-green/5">
                <div class="flex justify-between items-center mb-6 border-b border-stone-100 pb-4">
                    <h3 class="text-sm font-bold uppercase tracking-widest text-stone-green">Arrival Traffic</h3>
                    <span class="text-[9px] font-bold text-gold bg-gold/10 px-2 py-1 rounded uppercase">Live Timeline</span>
                </div>
                <div class="chart-container">
                    <canvas id="peakChart"></canvas>
                </div>
            </div>
        </div>

        <!-- Attendance Explorer Table -->
        <div class="glass-card rounded-[2.5rem] overflow-hidden shadow-xl shadow-stone-green/5">
            <div class="p-8 border-b border-stone-100 flex flex-col md:flex-row justify-between items-center gap-4">
                <h3 class="text-sm font-bold uppercase tracking-widest text-stone-green">Attendance Explorer</h3>
                <div class="flex gap-2 p-1 bg-stone-50 rounded-full border border-stone-100">
                    <button onclick="filterTable('all')" class="filter-btn px-4 py-2 rounded-full text-[9px] font-bold uppercase tracking-widest bg-stone-green text-white transition-all">All</button>
                    <button onclick="filterTable('hadir')" class="filter-btn px-4 py-2 rounded-full text-[9px] font-bold uppercase tracking-widest text-stone-400 transition-all">Present</button>
                    <button onclick="filterTable('belum')" class="filter-btn px-4 py-2 rounded-full text-[9px] font-bold uppercase tracking-widest text-stone-400 transition-all">Pending</button>
                </div>
            </div>
            <div class="overflow-x-auto max-h-[600px] custom-scrollbar">
                <table class="w-full text-left border-collapse">
                    <thead class="sticky top-0 bg-white/95 backdrop-blur-sm z-10 shadow-sm">
                        <tr class="bg-stone-50/50">
                            <th class="py-5 px-6 md:px-8 text-[10px] font-bold uppercase tracking-widest text-stone-400">Guest</th>
                            <th class="py-5 px-8 text-[10px] font-bold uppercase tracking-widest text-stone-400 hidden md:table-cell">Category</th>
                            <th class="py-5 px-6 md:px-8 text-[10px] font-bold uppercase tracking-widest text-stone-400">Status & Time</th>
                            <th class="py-5 px-8 text-[10px] font-bold uppercase tracking-widest text-stone-400 text-right hidden md:table-cell">Check-in Time</th>
                        </tr>
                    </thead>
                    <tbody id="guestTableBody" class="divide-y divide-stone-50">
                        <!-- Data rows load here -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Notification Toast -->
    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 bg-stone-dark text-white px-8 py-4 rounded-2xl text-[10px] font-bold uppercase tracking-[0.2em] opacity-0 transition-all transform translate-y-4 pointer-events-none z-50 shadow-2xl"></div>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbwsuDPy2rb0yf-2r0WyYUL6rSwIbMbxj5kp7fEpinXbQ9FkaXoQA5x_h0wUdwavAqhZvg/exec';
        let allGuests = [];
        let categoryChart, peakChart;

        async function refreshData() {
            const btn = document.getElementById('refreshBtn');
            const icon = document.getElementById('refreshIcon');
            
            btn.disabled = true;
            btn.classList.add('opacity-50');
            icon.classList.add('loading-spin');
            
            try {
                const [resTamu, resAbsen] = await Promise.all([
                    fetch(`${scriptURL}?type=get_tamu_manual&v=${Date.now()}`),
                    fetch(`${scriptURL}?type=get_absen&v=${Date.now()}`)
                ]);

                const masterTamu = await resTamu.json();
                const dataAbsen = await resAbsen.json();

                allGuests = masterTamu.map(tamu => {
                    const absen = dataAbsen.find(a => (a.nama || "").toLowerCase().trim() === (tamu.nama || "").toLowerCase().trim());
                    return {
                        nama: tamu.nama,
                        status: tamu.status || 'Reguler',
                        hadir: !!absen,
                        waktu: absen ? absen.waktu : '--:--'
                    };
                });

                updateDashboard();
                showToast("Data Synced Successfully");
            } catch (e) {
                console.error("Sync Error:", e);
                showToast("Connection Error. Try again.");
            } finally {
                btn.disabled = false;
                btn.classList.remove('opacity-50');
                icon.classList.remove('loading-spin');
            }
        }

        function updateDashboard() {
            const total = allGuests.length;
            const hadir = allGuests.filter(g => g.hadir).length;
            const belum = total - hadir;
            const persen = total > 0 ? Math.round((hadir / total) * 100) : 0;

            document.getElementById('statTotal').innerText = total;
            document.getElementById('statHadir').innerText = hadir;
            document.getElementById('statBelum').innerText = belum;
            document.getElementById('statPersen').innerText = `${persen}%`;

            renderCharts();
            filterTable('all');
        }

        function renderCharts() {
            const cats = { VVIP: 0, VIP: 0, REGULER: 0 };
            allGuests.forEach(g => {
                const s = (g.status || "").toUpperCase();
                if (s.includes('VVIP')) cats.VVIP++;
                else if (s.includes('VIP')) cats.VIP++;
                else cats.REGULER++;
            });

            if (categoryChart) categoryChart.destroy();
            categoryChart = new Chart(document.getElementById('categoryChart'), {
                type: 'doughnut',
                data: {
                    labels: ['VVIP', 'VIP', 'REGULAR'],
                    datasets: [{
                        data: [cats.VVIP, cats.VIP, cats.REGULER],
                        backgroundColor: ['#1c1917', '#d4af37', '#4a5d4a'],
                        borderWidth: 0,
                        hoverOffset: 12
                    }]
                },
                options: {
                    maintainAspectRatio: false,
                    plugins: { 
                        legend: { position: 'bottom', labels: { font: { size: 10, family: 'Montserrat' }, usePointStyle: true, padding: 20 } }
                    },
                    cutout: '75%'
                }
            });

            const timeBuckets = {};
            allGuests.filter(g => g.hadir && g.waktu !== '--:--').forEach(g => {
                const hour = g.waktu.split(':')[0] + ':00';
                timeBuckets[hour] = (timeBuckets[hour] || 0) + 1;
            });

            const sortedHours = Object.keys(timeBuckets).sort();
            const arrivalData = sortedHours.map(h => timeBuckets[h]);

            if (peakChart) peakChart.destroy();
            peakChart = new Chart(document.getElementById('peakChart'), {
                type: 'bar',
                data: {
                    labels: sortedHours,
                    datasets: [{
                        label: 'Check-ins',
                        data: arrivalData,
                        backgroundColor: 'rgba(74, 93, 74, 0.8)',
                        borderColor: '#4a5d4a',
                        borderWidth: 1,
                        borderRadius: 10,
                        barThickness: 24
                    }]
                },
                options: {
                    maintainAspectRatio: false,
                    scales: {
                        y: { beginAtZero: true, grid: { display: false }, ticks: { stepSize: 1, font: { size: 10 } } },
                        x: { grid: { display: false }, ticks: { font: { size: 10, weight: '600' } } }
                    },
                    plugins: {
                        legend: { display: false },
                        tooltip: { backgroundColor: '#1c1917', padding: 12, cornerRadius: 8 }
                    }
                }
            });
        }

        function filterTable(type) {
            const body = document.getElementById('guestTableBody');
            body.innerHTML = '';

            let data = allGuests;
            if (type === 'hadir') data = allGuests.filter(g => g.hadir);
            if (type === 'belum') data = allGuests.filter(g => !g.hadir);

            document.querySelectorAll('.filter-btn').forEach(btn => {
                const onclickStr = btn.getAttribute('onclick');
                if (onclickStr.includes(`'${type}'`)) {
                    btn.classList.add('bg-stone-green', 'text-white', 'shadow-md');
                    btn.classList.remove('text-stone-400');
                } else {
                    btn.classList.remove('bg-stone-green', 'text-white', 'shadow-md');
                    btn.classList.add('text-stone-400');
                }
            });

            if (data.length === 0) {
                body.innerHTML = '<tr><td colspan="4" class="py-20 text-center text-stone-300 italic uppercase tracking-widest text-[10px]">No matches found</td></tr>';
                return;
            }

            data.forEach(g => {
                let badge = 'bg-stone-100 text-stone-400';
                if ((g.status || "").toUpperCase().includes('VVIP')) badge = 'bg-stone-dark text-white';
                else if ((g.status || "").toUpperCase().includes('VIP')) badge = 'bg-gold text-white';

                const tr = document.createElement('tr');
                tr.className = "hover:bg-stone-50/50 transition-colors border-b border-stone-50";
                tr.innerHTML = `
                    <td class="py-4 px-6 md:px-8">
                        <div class="text-xs font-bold text-stone-800 uppercase tracking-tight">${g.nama}</div>
                        <div class="md:hidden mt-1">
                             <span class="px-2 py-0.5 rounded-full text-[7px] font-black uppercase tracking-widest ${badge}">${g.status}</span>
                        </div>
                    </td>
                    <td class="py-4 px-8 hidden md:table-cell">
                        <span class="px-3 py-1 rounded-full text-[8px] font-black uppercase tracking-widest ${badge}">${g.status}</span>
                    </td>
                    <td class="py-4 px-6 md:px-8">
                        <div class="text-[9px] font-bold ${g.hadir ? 'text-green-600' : 'text-stone-300'} uppercase">
                            ${g.hadir ? '✓ PRESENT' : '○ PENDING'}
                        </div>
                        <div class="md:hidden text-[10px] font-mono font-bold text-stone-500 mt-0.5">${g.waktu}</div>
                    </td>
                    <td class="py-4 px-8 text-right font-mono text-[10px] font-bold text-stone-500 hidden md:table-cell">
                        ${g.waktu}
                    </td>
                `;
                body.appendChild(tr);
            });
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.style.opacity = "1";
            t.style.transform = "translate(-50%, 0)";
            setTimeout(() => {
                t.style.opacity = "0";
                t.style.transform = "translate(-50%, 1rem)";
            }, 3000);
        }

        document.addEventListener('DOMContentLoaded', refreshData);
    </script>
</body>
</html>
