<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Buku Tamu Digital - Fadil & Aisyah</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Montserrat', sans-serif; background-color: #f4f1ee; }
        .bg-stone-green { background-color: #4a5d4a; }
        .text-stone-green { color: #4a5d4a; }
        
        #reader {
            border: none !important;
            border-radius: 20px;
            overflow: hidden;
        }
        #reader__dashboard_section_csr button {
            background-color: #4a5d4a !important;
            color: white !important;
            padding: 10px 20px !important;
            border-radius: 50px !important;
            text-transform: uppercase;
            font-size: 12px;
            font-weight: bold;
            border: none !important;
            margin-top: 10px !important;
        }
        video { border-radius: 15px; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center">

    <div class="w-full bg-stone-green p-6 text-white text-center shadow-lg">
        <h1 class="text-lg font-bold tracking-widest uppercase">Digital Guest Book</h1>
        <p class="text-xs opacity-80 mt-1">Fadil & Aisyah Wedding</p>
    </div>

    <div class="w-full max-w-md p-6">
        <div class="bg-white rounded-3xl shadow-xl p-4 border border-stone-200">
            <div id="reader" class="w-full"></div>
        </div>

        <div id="status-container" class="mt-6">
            <div id="idle-msg" class="text-center p-4 bg-stone-200 rounded-2xl text-stone-600 text-sm italic">
                Arahkan kamera ke QR Code tamu...
            </div>
            
            <div id="success-msg" class="hidden text-center p-5 bg-green-600 text-white rounded-2xl shadow-lg animate-bounce">
                <p class="text-xs uppercase tracking-widest opacity-80">Berhasil Dicatat</p>
                <h2 id="guest-name-result" class="text-xl font-bold mt-1">Nama Tamu</h2>
            </div>
        </div>

        <div class="mt-8 grid grid-cols-2 gap-4">
            <a href="rekap.html" class="flex flex-col items-center justify-center p-4 bg-white rounded-2xl border border-stone-200 shadow-sm">
                <span class="text-stone-green font-bold">Rekap</span>
                <span class="text-[10px] text-gray-400">Lihat Daftar</span>
            </a>
            <button onclick="location.reload()" class="flex flex-col items-center justify-center p-4 bg-white rounded-2xl border border-stone-200 shadow-sm">
                <span class="text-stone-green font-bold">Refresh</span>
                <span class="text-[10px] text-gray-400">Reset Kamera</span>
            </button>
        </div>
    </div>

    <script>
    // 1. URL GOOGLE APPS SCRIPT
    const scriptURL = 'https://script.google.com/macros/s/AKfycbzafTyat2cxVwfeNref5R-oBGX5ITy0pLy-tbEGhHvpAJ_f2rnXS9U1pFDfXj3jpGDtIw/exec';
    let isProcessing = false;

    // 2. LOGIKA SAAT SCAN BERHASIL
    function onScanSuccess(decodedText, decodedResult) {
        if (isProcessing) return; 
        isProcessing = true;

        // 1. Bedah data QR (Format: "Nama | Status | Kode Unik")
        const data = decodedText.split(" | ");
        const namaTamu = data[0] ? data[0].trim() : "Tanpa Nama";
        const statusTamu = data[1] ? data[1].trim() : "Reguler";
        const kodeUnik = data[2] ? data[2].trim() : "N/A";

        const successBox = document.getElementById('success-msg');
        const guestName = document.getElementById('guest-name-result');
        const idleMsg = document.getElementById('idle-msg');

        // 2. Set tampilan Nama & Warna (Kuning/Gold untuk VIP)
        if (statusTamu.toUpperCase() === "VIP") {
            successBox.style.backgroundColor = "#FFD700"; // Warna Kuning Emas
            successBox.style.color = "#000000"; // Tulisan Hitam agar kontras
            guestName.innerHTML = `
                <div style="font-weight: bold; font-size: 14px; letter-spacing: 2px;">🌟 VIP GUEST 🌟</div>
                <div style="font-size: 24px; margin: 5px 0;">${namaTamu}</div>
                <div style="font-size: 12px; font-weight: normal; opacity: 0.8;">ID: ${kodeUnik}</div>
            `;
        } else {
            successBox.style.backgroundColor = "#16a34a"; // Warna Hijau Standard
            successBox.style.color = "#ffffff"; // Tulisan Putih
            guestName.innerHTML = `
                <div style="font-size: 22px; margin-bottom: 5px;">${namaTamu}</div>
                <div style="font-size: 12px; font-weight: normal; opacity: 0.9;">ID: ${kodeUnik}</div>
            `;
        }

        // 3. Tampilkan Pesan Sukses
        idleMsg.classList.add('hidden');
        successBox.classList.remove('hidden');

        // 4. LOGIKA PERCEPAT REKAP (Local Storage)
        const newEntry = {
            nama: namaTamu,
            status: statusTamu,
            id: kodeUnik,
            waktu: new Date().toLocaleTimeString('it-IT', { hour: '2-digit', minute: '2-digit' })
        };

        let localData = JSON.parse(localStorage.getItem('rekap_tamu') || '[]');
        localData.unshift(newEntry); 
        localStorage.setItem('rekap_tamu', JSON.stringify(localData));

        // 5. Kirim data ke Google Sheets (Termasuk Kode Unik)
        const finalURL = `${scriptURL}?nama=${encodeURIComponent(namaTamu)}&status=${encodeURIComponent(statusTamu)}&kode=${encodeURIComponent(kodeUnik)}&type=absen`;
        
        fetch(finalURL, { mode: 'no-cors' })
        .catch(err => console.error("Gagal kirim ke server:", err));

        // 6. Reset scanner setelah 3 detik
        setTimeout(() => {
            successBox.classList.add('hidden');
            idleMsg.classList.remove('hidden');
            // Reset warna ke default hijau untuk scan berikutnya
            successBox.style.backgroundColor = "#16a34a"; 
            successBox.style.color = "#ffffff";
            isProcessing = false;
        }, 3000);
    }

    function onScanFailure(error) {
        // Abaikan error saat mencari kode
    }

    // 7. MENJALANKAN KAMERA
    let html5QrcodeScanner = new Html5QrcodeScanner(
        "reader", { 
            fps: 20, 
            qrbox: { width: 250, height: 250 },
            aspectRatio: 1.0 
        }
    );

    html5QrcodeScanner.render(onScanSuccess, onScanFailure);
    </script>
</body>
</html>
