<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Buku Tamu Digital - Fadil & Aisyah</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Montserrat', sans-serif; background-color: #f4f1ee; }
        .bg-stone-green { background-color: #4a5d4a; }
        .text-stone-green { color: #4a5d4a; }
        
        #reader {
            border: none !important;
            border-radius: 20px;
            overflow: hidden;
        }
        #reader__dashboard_section_csr button {
            background-color: #4a5d4a !important;
            color: white !important;
            padding: 10px 20px !important;
            border-radius: 50px !important;
            text-transform: uppercase;
            font-size: 12px;
            font-weight: bold;
            border: none !important;
            margin-top: 10px !important;
        }
        video { border-radius: 15px; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center">

    <div class="w-full bg-stone-green p-6 text-white text-center shadow-lg">
        <h1 class="text-lg font-bold tracking-widest uppercase">Digital Guest Book</h1>
        <p class="text-xs opacity-80 mt-1">Fadil & Aisyah Wedding</p>
    </div>

    <div class="w-full max-w-md p-6">
        <div class="bg-white rounded-3xl shadow-xl p-4 border border-stone-200">
            <div id="reader" class="w-full"></div>
        </div>

        <div id="status-container" class="mt-6">
            <div id="idle-msg" class="text-center p-4 bg-stone-200 rounded-2xl text-stone-600 text-sm italic">
                Arahkan kamera ke QR Code tamu...
            </div>
            
            <div id="success-msg" class="hidden text-center p-5 bg-green-600 text-white rounded-2xl shadow-lg animate-bounce">
                <p class="text-xs uppercase tracking-widest opacity-80">Berhasil Dicatat</p>
                <h2 id="guest-name-result" class="text-xl font-bold mt-1">Nama Tamu</h2>
            </div>
        </div>

        <div class="mt-8 grid grid-cols-2 gap-4">
            <a href="rekap.html" class="flex flex-col items-center justify-center p-4 bg-white rounded-2xl border border-stone-200 shadow-sm">
                <span class="text-stone-green font-bold">Rekap</span>
                <span class="text-[10px] text-gray-400">Lihat Daftar</span>
            </a>
            <button onclick="location.reload()" class="flex flex-col items-center justify-center p-4 bg-white rounded-2xl border border-stone-200 shadow-sm">
                <span class="text-stone-green font-bold">Refresh</span>
                <span class="text-[10px] text-gray-400">Reset Kamera</span>
            </button>
        </div>
    </div>

    <script>
    // 1. URL GOOGLE APPS SCRIPT
    const scriptURL = 'https://script.google.com/macros/s/AKfycbykfVqwV0Mxhkef70XalVWFQrjH2O-BVLRU2kY0gVRRJ8yWPI3DMYKw-s0nbdGpAFG1tg/exec';
    let isProcessing = false;

    function onScanSuccess(decodedText, decodedResult) {
        if (isProcessing) return; 
        isProcessing = true;

        // 1. Bedah data QR (Nama | Status | ID)
        const data = decodedText.split("|");
        const namaTamu = data[0] ? data[0].trim() : "Tanpa Nama";
        const statusTamu = data[1] ? data[1].trim() : "Reguler";
        const kodeUnik = data[2] ? data[2].trim() : "-"; // Tetap diambil untuk database

        const successBox = document.getElementById('success-msg');
        const guestName = document.getElementById('guest-name-result');
        const idleMsg = document.getElementById('idle-msg');

        // 2. Set tampilan (Hanya Nama saja yang muncul)
        if (statusTamu.toUpperCase() === "VIP") {
            successBox.style.backgroundColor = "#FFD700"; // Kuning Emas
            successBox.style.color = "#000"; 
            guestName.innerHTML = `
                <div style="font-size: 14px; font-weight: bold; margin-bottom: 5px;">VIP GUEST</div>
                <div style="font-size: 28px; font-weight: bold; line-height: 1.2;">${namaTamu}</div>
            `;
        } else {
            successBox.style.backgroundColor = "#16a34a"; // Hijau
            successBox.style.color = "#fff";
            guestName.innerHTML = `
                <div style="font-size: 28px; font-weight: bold;">${namaTamu}</div>
            `;
        }

        // 3. Munculkan pesan sukses
        idleMsg.classList.add('hidden');
        successBox.classList.remove('hidden');

        
        // 4. Kirim data lengkap ke Google Sheets
        const finalURL = `${scriptURL}?type=absen&nama=${encodeURIComponent(namaTamu)}&status=${encodeURIComponent(statusTamu)}`;
        
        console.log("Mengirim data:", finalURL); // Cek ini di console browser (F12)

        fetch(finalURL)
        .then(res => res.json())
        .then(result => {
            console.log("Respon Berhasil:", result);
        })
        .catch(err => {
            console.error("Gagal mengirim data:", err);
        });

        // 5. Reset tampilan setelah 3 detik
        setTimeout(() => {
            successBox.classList.add('hidden');
            idleMsg.classList.remove('hidden');
            isProcessing = false;
        }, 3000);
    }

    function onScanFailure(error) { /* Abaikan error */ }

    // PENGATURAN SCANNER YANG LEBIH SENSITIF
        let html5QrcodeScanner = new Html5QrcodeScanner(
            "reader", 
            { 
                fps: 30,             // Meningkatkan frame per second (Standar industri untuk kecepatan)
                qrbox: function(viewfinderWidth, viewfinderHeight) {
                    // Membuat kotak scan yang dinamis (60% dari lebar layar)
                    let minEdgePercentage = 0.6; 
                    let minEdgeSize = Math.min(viewfinderWidth, viewfinderHeight);
                    let qrboxSize = Math.floor(minEdgeSize * minEdgePercentage);
                    return {
                        width: qrboxSize,
                        height: qrboxSize
                    };
                },
                aspectRatio: 1.0,    // Memastikan tampilan kamera kotak sempurna
                showTorchButtonIfSupported: true, // Menampilkan tombol senter jika gelap
                useBarCodeDetectorIfSupported: true, // MENGGUNAKAN HARDWARE ACCELERATION (Sangat Penting!)
                rememberLastUsedCamera: true
            }
        );
        
        html5QrcodeScanner.render(onScanSuccess, onScanFailure);;
    </script>
</body>
</html>
