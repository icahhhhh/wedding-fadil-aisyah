<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scanner QR - Fadil & Aisyah</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Montserrat', sans-serif; background-color: #f4f1ee; color: #1c1917; }
        .font-serif { font-family: 'Playfair Display', serif; }
        
        /* Bingkai Utama Scanner */
        #reader-container { 
            position: relative;
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
            border-radius: 32px;
            overflow: hidden;
            background: #fff;
            box-shadow: 0 25px 50px -12px rgba(74, 93, 74, 0.15);
            min-height: 450px;
        }

        #reader { width: 100% !important; border: none !important; }
        #reader video { object-fit: cover !important; width: 100% !important; height: 100% !important; }

        /* OVERLAY HASIL PENUH (FULL COLOR) */
        #resultOverlay {
            position: absolute; inset: 0; z-index: 100; display: none;
            flex-direction: column; align-items: center; justify-content: center;
            text-align: center; padding: 24px; animation: overlayIn 0.3s ease-out;
        }

        @keyframes overlayIn { from { opacity: 0; } to { opacity: 1; } }

        /* TAMPILAN SETUP */
        #setupUI {
            position: absolute; inset: 0; z-index: 40; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: #fff; padding: 30px; text-align: center;
        }

        .btn-primary {
            background-color: #4a5d4a; color: white;
            padding: 14px 32px; border-radius: 50px;
            text-transform: uppercase; font-size: 11px; font-weight: 700;
            letter-spacing: 0.1em; transition: all 0.2s;
        }
        .btn-secondary {
            background-color: #fff; color: #4a5d4a;
            padding: 12px 24px; border-radius: 50px;
            text-transform: uppercase; font-size: 10px; font-weight: 700;
            letter-spacing: 0.1em; border: 2px solid #4a5d4a; transition: all 0.2s;
        }
        .btn-stop {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            background-color: rgba(239, 68, 68, 0.9); color: white;
            padding: 10px 24px; border-radius: 50px;
            text-transform: uppercase; font-size: 10px; font-weight: 700;
            z-index: 50; display: none;
        }

        /* Warna Status Penuh */
        .status-reguler { background-color: #22c55e !important; color: white; }
        .status-vip { background-color: #d4af37 !important; color: white; }
        .status-vvip { background-color: #94a3b8 !important; color: white; }
        .status-error { background-color: #ef4444 !important; color: white; }

        .hw-indicator { transition: all 0.3s; }
        .hw-active { background-color: #22c55e !important; box-shadow: 0 0 10px #22c55e; }
    </style>
</head>
<body class="p-4 md:p-10 flex flex-col items-center min-h-screen">

    <div class="w-full max-w-md">
        <!-- Header -->
        <header class="text-center mb-8">
            <p class="text-[10px] font-bold text-stone-400 uppercase tracking-[0.4em] mb-1">Receptionist Desk</p>
            <h1 class="font-serif text-3xl text-[#4a5d4a] font-bold">Scanner Presensi</h1>
        </header>

        <!-- Container Scanner -->
        <div id="reader-container" class="mb-8">
            <!-- UI Pemilihan Kamera -->
            <div id="setupUI">
                <div class="w-16 h-16 bg-stone-100 rounded-full flex items-center justify-center text-stone-400 mb-6">
                    <span class="text-2xl">📷</span>
                </div>
                <h3 class="text-sm font-bold text-stone-green uppercase tracking-widest mb-4">Pilih Kamera</h3>
                <select id="cameraSelect" class="w-full mb-4 p-3 rounded-xl border border-stone-200 text-xs font-semibold outline-none bg-stone-50 shadow-inner">
                    <option value="">Memuat kamera...</option>
                </select>
                <button id="startBtn" class="btn-primary w-full shadow-lg shadow-stone-green/20 mb-3">Mulai Scan Kamera</button>
                
                <div class="flex items-center gap-4 w-full my-4">
                    <hr class="flex-grow border-stone-200">
                    <span class="text-[9px] font-bold text-stone-300 uppercase tracking-widest">Atau</span>
                    <hr class="flex-grow border-stone-200">
                </div>

                <label for="fileInput" class="btn-secondary w-full text-center cursor-pointer flex items-center justify-center gap-2">
                    <span>🖼️ Pilih dari Galeri</span>
                    <input type="file" id="fileInput" accept="image/*" class="hidden">
                </label>
            </div>

            <!-- Tombol Stop (Muncul saat scan) -->
            <button id="stopBtn" class="btn-stop shadow-lg">Hentikan Scan</button>

            <!-- Kamera Area -->
            <div id="reader"></div>

            <!-- Overlay Hasil Scan Penuh -->
            <div id="resultOverlay">
                <div id="iconBox" class="w-24 h-24 rounded-full flex items-center justify-center mb-6 border-4 border-white/50 bg-white/20">
                    <span id="resultIcon" class="text-5xl font-bold">✓</span>
                </div>
                <div class="space-y-1">
                    <p class="text-[10px] font-bold uppercase tracking-[0.4em] opacity-80">Selamat Datang,</p>
                    <h2 id="resName" class="text-3xl font-serif font-bold px-4 leading-tight text-white tracking-tight uppercase">-- Nama Tamu --</h2>
                </div>
                <div class="mt-8 space-y-2">
                    <p class="text-[10px] font-bold uppercase tracking-[0.4em] opacity-80">Kategori</p>
                    <span id="resStatus" class="px-10 py-3 rounded-full text-xs font-black uppercase tracking-[0.2em] bg-white/20 border border-white/40 inline-block">-- Status --</span>
                </div>
                <div class="mt-12 pt-6 border-t border-white/20 w-full">
                    <p class="text-[10px] uppercase tracking-[0.5em] font-bold opacity-80">Data Tersimpan</p>
                </div>
            </div>
        </div>

        <!-- Indikator & Navigasi -->
        <div class="flex flex-col items-center gap-10 w-full mt-4">
            <div class="flex items-center gap-3 bg-white px-6 py-3 rounded-full border border-stone-100 shadow-sm">
                <div id="hwIndicator" class="w-2.5 h-2.5 bg-stone-300 rounded-full hw-indicator"></div>
                <span class="text-[10px] font-bold text-[#4a5d4a] uppercase tracking-widest">Scanner HC-P10 Siap</span>
            </div>

            <div class="w-full grid grid-cols-2 gap-4">
                <a href="rekap.html" class="flex flex-col items-center justify-center gap-3 bg-white p-6 rounded-[2rem] border border-stone-50 shadow-sm hover:bg-stone-50 transition-all active:scale-95 group">
                    <div class="text-xl group-hover:scale-110 transition-transform">📋</div>
                    <span class="text-[9px] font-bold text-[#4a5d4a] uppercase tracking-widest">Lihat Rekap</span>
                </a>
                <a href="bukutamu.html" class="flex flex-col items-center justify-center gap-2 bg-white p-4 rounded-[1.5rem] border border-stone-50 shadow-sm hover:bg-stone-50 transition-all active:scale-95 group">
                    <span class="text-xl group-hover:scale-110 transition-transform">📔</span>
                    <span class="text-[9px] font-bold text-[#4a5d4a] uppercase tracking-widest">Buku Manual</span>
                </a>
            </div>
        </div>
    </div>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbwsuDPy2rb0yf-2r0WyYUL6rSwIbMbxj5kp7fEpinXbQ9FkaXoQA5x_h0wUdwavAqhZvg/exec';
        let isProcessing = false;
        let html5QrCode;

        const overlay = document.getElementById('resultOverlay');
        const resName = document.getElementById('resName');
        const resStatus = document.getElementById('resStatus');
        const resIcon = document.getElementById('resultIcon');
        const setupUI = document.getElementById('setupUI');
        const cameraSelect = document.getElementById('cameraSelect');
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const fileInput = document.getElementById('fileInput');

        // 1. Inisialisasi Kamera & List
        async function initCameraList() {
            try {
                const cameras = await Html5Qrcode.getCameras();
                cameraSelect.innerHTML = '';
                if (cameras && cameras.length > 0) {
                    cameras.forEach(camera => {
                        const option = document.createElement('option');
                        option.value = camera.id;
                        option.text = camera.label || `Kamera ${cameraSelect.length + 1}`;
                        cameraSelect.appendChild(option);
                    });
                } else {
                    cameraSelect.innerHTML = '<option value="">Kamera tidak ditemukan</option>';
                }
            } catch (err) {
                cameraSelect.innerHTML = '<option value="">Izin kamera ditolak</option>';
            }
        }

        // 2. Jalankan Kamera
        startBtn.addEventListener('click', () => {
            const cameraId = cameraSelect.value;
            if (!cameraId) return;

            setupUI.style.display = 'none';
            stopBtn.style.display = 'block';
            html5QrCode = new Html5Qrcode("reader");
            
            const config = { 
                fps: 30, 
                qrbox: { width: 250, height: 250 },
                aspectRatio: 1.0
            };

            html5QrCode.start(cameraId, config, onScanSuccess).catch(err => {
                alert("Gagal memulai kamera: " + err);
                setupUI.style.display = 'flex';
                stopBtn.style.display = 'none';
            });
        });

        // 3. Scan dari Galeri File
        fileInput.addEventListener('change', e => {
            if (e.target.files.length === 0) return;
            const imageFile = e.target.files[0];
            
            // Inisialisasi engine jika belum ada
            if (!html5QrCode) html5QrCode = new Html5Qrcode("reader");

            html5QrCode.scanFile(imageFile, true)
                .then(decodedText => {
                    onScanSuccess(decodedText);
                })
                .catch(err => {
                    console.error("Gagal mendecode file:", err);
                    onScanFailure("File gambar tidak mengandung QR Code yang valid.");
                });
        });

        // 4. Hentikan Kamera
        stopBtn.addEventListener('click', async () => {
            if (html5QrCode) {
                try {
                    await html5QrCode.stop();
                    setupUI.style.display = 'flex';
                    stopBtn.style.display = 'none';
                } catch (err) {
                    console.error("Gagal menghentikan kamera", err);
                }
            }
        });

        // 5. Proses Hasil Scan
        function onScanSuccess(decodedText) {
            if (isProcessing) return;
            isProcessing = true;

            let nama = "";
            let status = "REGULER";
            let kode = "-";

            if (decodedText.includes('|')) {
                const parts = decodedText.split('|');
                nama = parts[0];
                status = (parts[1] || "REGULER").toUpperCase();
                kode = parts[2] || "-";
            } else {
                nama = decodedText;
            }

            // Reset Kelas Warna
            overlay.className = "";
            overlay.style.display = "flex";
            resIcon.innerText = "✓";

            // Tema Warna Penuh
            if (status.includes('VVIP')) {
                overlay.classList.add('status-vvip');
            } else if (status.includes('VIP')) {
                overlay.classList.add('status-vip');
            } else {
                overlay.classList.add('status-reguler');
            }

            resName.innerText = nama;
            resStatus.innerText = status;

            playBeep(800, 0.2);
            fetch(`${scriptURL}?type=absen&nama=${encodeURIComponent(nama)}&status=${encodeURIComponent(status)}&kode=${encodeURIComponent(kode)}`)
                .catch(e => console.error(e));

            setTimeout(() => { 
                overlay.style.display = "none"; 
                isProcessing = false; 
            }, 4000);
        }

        function onScanFailure(msg) {
            overlay.className = "status-error";
            overlay.style.display = "flex";
            resIcon.innerText = "!";
            resName.innerText = "Gagal!";
            resStatus.innerText = "ERROR";
            document.querySelector('#resultOverlay p:last-child').innerText = msg;
            
            playBeep(200, 0.5);
            setTimeout(() => { 
                overlay.style.display = "none"; 
                isProcessing = false; 
                document.querySelector('#resultOverlay p:last-child').innerText = "Data Tersimpan";
            }, 3000);
        }

        // 6. Logika Hardware Scanner HC-P10
        let buffer = "";
        let lastTime = Date.now();
        window.addEventListener('keydown', (e) => {
            const now = Date.now();
            const indicator = document.getElementById('hwIndicator');
            if (now - lastTime > 100) buffer = ""; 
            if (e.key === "Enter") {
                if (buffer.length > 0) { 
                    onScanSuccess(buffer); 
                    buffer = ""; 
                }
            } else if (e.key.length === 1) {
                buffer += e.key;
                indicator.classList.add('hw-active');
                setTimeout(() => { indicator.classList.remove('hw-active'); }, 400);
            }
            lastTime = now;
        });

        function playBeep(freq, duration) {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                oscillator.type = 'sine';
                oscillator.frequency.setValueAtTime(freq, audioCtx.currentTime);
                gainNode.gain.setValueAtTime(0.05, audioCtx.currentTime);
                oscillator.start();
                oscillator.stop(audioCtx.currentTime + duration);
            } catch(e) {}
        }

        document.addEventListener('DOMContentLoaded', initCameraList);
    </script>
</body>
</html>
