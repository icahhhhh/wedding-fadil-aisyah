<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scanner QR - Fadil & Aisyah</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Montserrat', sans-serif; background-color: #f4f1ee; }
        .bg-stone-green { background-color: #4a5d4a; }
        .text-stone-green { color: #4a5d4a; }
        
        #reader { border: none !important; border-radius: 20px; overflow: hidden; }
        #reader__dashboard_section_csr button {
            background-color: #4a5d4a !important; color: white !important;
            padding: 10px 20px !important; border-radius: 50px !important;
            text-transform: uppercase; font-size: 12px; font-weight: bold;
            border: none !important; margin-top: 10px !important;
        }
        video { border-radius: 15px; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center">

    <div class="w-full bg-stone-green p-6 text-white text-center shadow-lg">
        <h1 class="text-lg font-bold tracking-widest uppercase">Digital Guest Book</h1>
        <p class="text-xs opacity-80 mt-1">Fadil & Aisyah Wedding</p>
    </div>

    <div class="w-full max-w-md p-6">
        <div class="bg-white rounded-3xl shadow-xl p-4 border border-stone-200">
            <div id="reader" class="w-full"></div>
        </div>

        <div id="status-container" class="mt-6">
            <div id="idle-msg" class="text-center p-4 bg-stone-200 rounded-2xl text-stone-600 text-sm italic">
                Arahkan kamera ke QR Code tamu...
            </div>
            
            <div id="success-msg" class="hidden text-center p-5 text-white rounded-2xl shadow-lg animate-bounce">
                <p class="text-xs uppercase tracking-widest opacity-80">Berhasil Dicatat</p>
                <h2 id="guest-name-result" class="text-xl font-bold mt-1">Nama Tamu</h2>
            </div>
        </div>

        <div class="mt-8 grid grid-cols-3 gap-3">
            <a href="rekap.html" class="flex flex-col items-center justify-center p-4 bg-white rounded-2xl border border-stone-200 shadow-sm">
                <span class="text-stone-green font-bold text-sm">Rekap</span>
                <span class="text-[10px] text-gray-400">Lihat Daftar</span>
            </a>
            <a href="bukutamu.html" class="flex flex-col items-center justify-center p-4 bg-white rounded-2xl border border-stone-200 shadow-sm">
                <span class="text-stone-green font-bold text-sm">Manual</span>
                <span class="text-[10px] text-gray-400">Buku Tamu</span>
            </a>
            <button onclick="location.reload()" class="flex flex-col items-center justify-center p-4 bg-white rounded-2xl border border-stone-200 shadow-sm">
                <span class="text-stone-green font-bold text-sm">Refresh</span>
                <span class="text-[10px] text-gray-400">Reset Kamera</span>
            </button>
        </div>
    </div>

    <script>
    // ✅ URL BARU - SAMA DENGAN SEMUA FILE LAINNYA
    const scriptURL = 'https://script.google.com/macros/s/AKfycbyWUFupf09SSpNyYuUw7-zX_snccsaYApQ9MW56olliOkYqnuPvSxCm_Q3nbNkBCeqibg/exec';
    let isProcessing = false;

    function onScanSuccess(decodedText, decodedResult) {
        if (isProcessing) return; 
        isProcessing = true;

        const data = decodedText.split("|");
        const namaTamu = data[0] ? data[0].trim() : "Tanpa Nama";
        const statusTamu = data[1] ? data[1].trim() : "Reguler";

        const successBox = document.getElementById('success-msg');
        const guestName = document.getElementById('guest-name-result');
        const idleMsg = document.getElementById('idle-msg');
        const statusUpper = statusTamu.toUpperCase();

        if (statusUpper === "VVIP") {
            successBox.style.backgroundColor = "#C0C0C0";
            successBox.style.color = "#333";
            guestName.innerHTML = `
                <div style="font-size: 14px; font-weight: bold; margin-bottom: 5px; letter-spacing: 2px;">VVIP GUEST</div>
                <div style="font-size: 28px; font-weight: bold; line-height: 1.2;">${namaTamu}</div>
            `;
        } else if (statusUpper === "VIP") {
            successBox.style.backgroundColor = "#FFD700";
            successBox.style.color = "#000";
            guestName.innerHTML = `
                <div style="font-size: 14px; font-weight: bold; margin-bottom: 5px;">VIP GUEST</div>
                <div style="font-size: 28px; font-weight: bold; line-height: 1.2;">${namaTamu}</div>
            `;
        } else {
            successBox.style.backgroundColor = "#16a34a";
            successBox.style.color = "#fff";
            guestName.innerHTML = `<div style="font-size: 28px; font-weight: bold;">${namaTamu}</div>`;
        }

        idleMsg.classList.add('hidden');
        successBox.classList.remove('hidden');

        // ✅ Kirim ke Google Sheets dengan URL baru
        const finalURL = `${scriptURL}?type=absen&nama=${encodeURIComponent(namaTamu)}&status=${encodeURIComponent(statusTamu)}`;
        fetch(finalURL)
            .then(res => res.json())
            .then(result => console.log("Absen berhasil:", result))
            .catch(err => console.error("Gagal kirim absen:", err));

        setTimeout(() => {
            successBox.classList.add('hidden');
            idleMsg.classList.remove('hidden');
            isProcessing = false;
        }, 3000);
    }

    function onScanFailure(error) { /* Abaikan */ }

    const config = {
        fps: 60,
        qrbox: (viewfinderWidth, viewfinderHeight) => {
            let size = Math.min(viewfinderWidth, viewfinderHeight) * 0.75;
            return { width: size, height: size };
        },
        aspectRatio: 1.0,
        videoConstraints: {
            facingMode: "environment",
            width: { min: 640, ideal: 1280, max: 1920 },
            height: { min: 480, ideal: 720, max: 1080 },
            frameRate: { ideal: 60 }
        },
        showTorchButtonIfSupported: true,
        useBarCodeDetectorIfSupported: true,
        rememberLastUsedCamera: true,
        experimentalFeatures: { useBarCodeDetectorIfSupported: true }
    };

    let html5QrcodeScanner = new Html5QrcodeScanner("reader", config, false);
    html5QrcodeScanner.render(onScanSuccess, onScanFailure);
    </script>
</body>
</html>
