<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Guest Check-in Scanner | Fadil & Aisyah</title>

    <!-- Open Graph Meta Tags -->
    <meta property="og:title" content="Guest Check-in Scanner Fadil & Aisyah">
    <meta property="og:description" content="QR Code Check-in System">
    <meta property="og:image" content="logo.jpg">
    <meta property="og:type" content="website">

    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Montserrat', sans-serif; background-color: #f4f1ee; color: #1c1917; }
        .font-serif { font-family: 'Playfair Display', serif; }
        
        .camera-section {
            position: relative;
            width: 100%;
            background: #fff;
            border-radius: 32px 32px 0 0;
            overflow: hidden;
            min-height: 500px;
            display: flex;
            flex-direction: column;
        }

        #reader { width: 100% !important; border: none !important; height: 500px !important; background: #fff; }
        #reader video { object-fit: cover !important; width: 100% !important; height: 100% !important; }

        .controls-section {
            background: #fff;
            padding: 24px;
            border-radius: 0 0 32px 32px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 15px 30px -10px rgba(74, 93, 74, 0.1);
            border-top: 1px solid #f1f1f1;
            min-height: 80px;
        }

        #resultOverlay {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            z-index: 100; display: none; flex-direction: column; 
            align-items: center; justify-content: center;
            text-align: center; padding: 24px; animation: overlayIn 0.3s ease-out;
        }

        @keyframes overlayIn { from { opacity: 0; } to { opacity: 1; } }

        #setupUI {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            z-index: 40; display: flex; flex-direction: column; 
            align-items: center; justify-content: center;
            background: #fff; padding: 30px; text-align: center;
        }

        .btn-primary {
            background-color: #4a5d4a; color: white;
            padding: 14px 32px; border-radius: 50px;
            text-transform: uppercase; font-size: 11px; font-weight: 700;
            letter-spacing: 0.1em; transition: all 0.2s;
        }
        .btn-secondary {
            background-color: #f9f9f9; color: #4a5d4a;
            padding: 12px 24px; border-radius: 50px;
            text-transform: uppercase; font-size: 10px; font-weight: 700;
            letter-spacing: 0.1em; border: 1px solid #e0e2db; transition: all 0.2s;
        }
        .btn-stop {
            background-color: #ef4444; color: white;
            padding: 12px 32px; border-radius: 50px;
            text-transform: uppercase; font-size: 10px; font-weight: 700;
            display: none; transition: all 0.2s;
        }

        .status-reguler { background-color: #4a5d4a !important; color: white; }
        .status-vip { background-color: #d4af37 !important; color: white; }
        .status-vvip { background-color: #1c1917 !important; color: white; }
        .status-error { background-color: #ef4444 !important; color: white; }

        .hw-indicator { transition: all 0.3s; }
        .hw-active { background-color: #22c55e !important; box-shadow: 0 0 10px #22c55e; }
    </style>
</head>
<body class="p-4 md:p-10 flex flex-col items-center min-h-screen">

    <div class="w-full max-w-md">
        <!-- Header -->
        <header class="text-center mb-8">
            <p class="text-[10px] font-bold text-stone-500 uppercase tracking-[0.4em] mb-1">Receptionist Desk</p>
            <h1 class="font-serif text-3xl text-[#4a5d4a] font-bold">Check-in Scanner</h1>
        </header>

        <!-- Main Card Wrapper -->
        <div class="shadow-2xl rounded-[32px] overflow-hidden mb-8">
            <div class="camera-section">
                <div id="setupUI">
                    <div class="w-20 h-20 bg-stone-100 rounded-full flex items-center justify-center text-stone-400 mb-6">
                        <span class="text-3xl">📷</span>
                    </div>
                    <h3 class="text-sm font-bold text-stone-green uppercase tracking-widest mb-6">Select Camera</h3>
                    <select id="cameraSelect" class="w-full mb-6 p-4 rounded-xl border border-stone-200 text-xs font-semibold outline-none bg-stone-50">
                        <option value="">Loading cameras...</option>
                    </select>
                    <button id="startBtn" class="btn-primary w-full shadow-lg mb-4">Start Camera Scan</button>
                    
                    <div class="flex items-center gap-4 w-full my-4">
                        <hr class="flex-grow border-stone-200">
                        <span class="text-[9px] font-bold text-stone-300 uppercase tracking-widest">OR</span>
                        <hr class="flex-grow border-stone-200">
                    </div>

                    <label for="fileInput" class="btn-secondary w-full text-center cursor-pointer flex items-center justify-center gap-2">
                        <span>🖼️ Scan from Image File</span>
                        <input type="file" id="fileInput" accept="image/*" class="hidden">
                    </label>
                </div>

                <div id="reader"></div>

                <div id="resultOverlay">
                    <div id="iconBox" class="w-24 h-24 rounded-full flex items-center justify-center mb-8 border-4 border-white/50 bg-white/20">
                        <span id="resultIcon" class="text-5xl font-bold">✓</span>
                    </div>
                    <div class="space-y-2">
                        <p class="text-[11px] font-bold uppercase tracking-[0.4em] opacity-80 text-white">Welcome,</p>
                        <h2 id="resName" class="text-3xl font-serif font-bold px-4 leading-tight text-white tracking-tight uppercase">-- Guest Name --</h2>
                    </div>
                    <div class="mt-8 space-y-3">
                        <p class="text-[11px] font-bold uppercase tracking-[0.4em] opacity-80 text-white">Category</p>
                        <span id="resStatus" class="px-10 py-3 rounded-full text-sm font-black uppercase tracking-[0.2em] bg-white/20 border border-white/40 inline-block text-white">-- Status --</span>
                    </div>
                </div>
            </div>

            <div class="controls-section">
                <button id="stopBtn" class="btn-stop shadow-md">Stop Scanning</button>
                <div id="idleMsg" class="text-[10px] text-stone-400 font-bold tracking-widest text-center uppercase">
                    #AIfinallyFaundlove
                </div>
            </div>
        </div>

        <!-- Connection Status & Navigation -->
        <div class="flex flex-col items-center gap-8 w-full mt-4">
            <div class="flex items-center gap-3 bg-white px-6 py-3 rounded-full border border-stone-100 shadow-sm">
                <div id="hwIndicator" class="w-2.5 h-2.5 bg-stone-300 rounded-full hw-indicator"></div>
                <span class="text-[10px] font-bold text-[#4a5d4a] uppercase tracking-widest">Hardware Scanner Connected</span>
            </div>

            <div class="w-full grid grid-cols-2 gap-4">
                <a href="rekap.html" class="flex flex-col items-center justify-center gap-3 bg-white p-6 rounded-[2rem] border border-stone-50 shadow-sm hover:bg-stone-50 transition-all active:scale-95 group">
                    <div class="text-xl group-hover:scale-110 transition-transform">📋</div>
                    <span class="text-[9px] font-bold text-[#4a5d4a] uppercase tracking-widest">Attendance Recap</span>
                </a>
                <a href="bukutamu.html" class="flex flex-col items-center justify-center gap-2 bg-white p-4 rounded-[1.5rem] border border-stone-50 shadow-sm hover:bg-stone-50 transition-all active:scale-95 group">
                    <span class="text-xl group-hover:scale-110 transition-transform">📔</span>
                    <span class="text-[9px] font-bold text-[#4a5d4a] uppercase tracking-widest">Guest Book</span>
                </a>
            </div>
        </div>
    </div>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbyE6E3w8NHNkclZ3Afv4sBHwl4Ozlf4W13xosUKMKk6CtBQzracQXnNpHDeu1GcIuub8g/exec';
        let isProcessing = false;
        let html5QrCode;

        /**
         * VOICE OUTPUT FUNCTION (GREETING)
         * Greets the guest using Web Speech API in English.
         * Adjusted for a feminine tone and optimal mobile playback.
         */
        function speakWelcome(name, category) {
            if ('speechSynthesis' in window) {
                // Cancel ongoing speech to prevent overlapping
                window.speechSynthesis.cancel();

                const message = new SpeechSynthesisUtterance();
                
                // Prepare greeting message
                let greeting = `Selamat datang, ${name}.`;
                if (category.includes("VIP") || category.includes("VVIP")) {
                    greeting = `Selamat datang, Tamu kehormatan, ${name}.`;
                }

                message.text = greeting;
                message.lang = 'id'; // Using Indonesian
                message.rate = 1.0;     // Slightly slower for clarity
                message.pitch = 1.0;    // Increased pitch for a feminine tone

                // Attempt to find a female voice for Indonesian
                const voices = window.speechSynthesis.getVoices();
                const femaleVoice = voices.find(voice => 
                    voice.lang.includes('id') && 
                    (
                        voice.name.toLowerCase().includes('female') || 
                        voice.name.toLowerCase().includes('woman') || 
                        voice.name.toLowerCase().includes('gadis') || 
                        voice.name.toLowerCase().includes('indonesia') ||
                        voice.name.toLowerCase().includes('google bahasa indonesia')
                    )
                );

                if (femaleVoice) {
                    message.voice = femaleVoice;
                }

                window.speechSynthesis.speak(message);
            }
        }

        /**
         * AUDIO UNLOCK FUNCTION (MOBILE OPTIMIZATION)
         * Required to enable sound on Chrome Android / Safari iOS.
         */
        function unlockVoice() {
            if ('speechSynthesis' in window) {
                const dummy = new SpeechSynthesisUtterance('');
                dummy.volume = 0; 
                window.speechSynthesis.speak(dummy);
            }
        }

        function playBeep(freq, duration) {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                oscillator.type = 'sine';
                oscillator.frequency.setValueAtTime(freq, audioCtx.currentTime);
                gainNode.gain.setValueAtTime(0.05, audioCtx.currentTime);
                oscillator.start();
                oscillator.stop(audioCtx.currentTime + duration);
            } catch(e) {}
        }

        const overlay = document.getElementById('resultOverlay');
        const resName = document.getElementById('resName');
        const resStatus = document.getElementById('resStatus');
        const resIcon = document.getElementById('resultIcon');
        const setupUI = document.getElementById('setupUI');
        const cameraSelect = document.getElementById('cameraSelect');
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const fileInput = document.getElementById('fileInput');
        const idleMsg = document.getElementById('idleMsg');

        async function initCameraList() {
            try {
                const cameras = await Html5Qrcode.getCameras();
                cameraSelect.innerHTML = '';
                if (cameras && cameras.length > 0) {
                    cameras.forEach(camera => {
                        const option = document.createElement('option');
                        option.value = camera.id;
                        option.text = camera.label || `Camera ${cameraSelect.length + 1}`;
                        cameraSelect.appendChild(option);
                    });
                } else {
                    cameraSelect.innerHTML = '<option value="">No cameras found</option>';
                }
            } catch (err) {
                cameraSelect.innerHTML = '<option value="">Permission denied</option>';
            }
        }

        startBtn.addEventListener('click', () => {
            // Unlock audio on user interaction
            unlockVoice();

            const cameraId = cameraSelect.value;
            if (!cameraId) return;
            setupUI.style.display = 'none';
            stopBtn.style.display = 'block';
            idleMsg.style.display = 'none';
            html5QrCode = new Html5Qrcode("reader");
            html5QrCode.start(cameraId, { fps: 30, qrbox: (w, h) => ({ width: w * 0.7, height: w * 0.7 }), aspectRatio: 1.0 }, onScanSuccess).catch(err => {
                alert("Error: " + err);
                setupUI.style.display = 'flex';
                stopBtn.style.display = 'none';
            });
        });

        fileInput.addEventListener('change', e => {
            unlockVoice();
            if (e.target.files.length === 0) return;
            if (!html5QrCode) html5QrCode = new Html5Qrcode("reader");
            html5QrCode.scanFile(e.target.files[0], true).then(decodedText => onScanSuccess(decodedText)).catch(() => onScanFailure());
        });

        stopBtn.addEventListener('click', async () => {
            if (html5QrCode) {
                await html5QrCode.stop();
                setupUI.style.display = 'flex';
                stopBtn.style.display = 'none';
                idleMsg.style.display = 'block';
            }
        });

        function onScanSuccess(decodedText) {
            if (isProcessing) return;
            isProcessing = true;

            let name = "", status = "REGULAR", kode = "QR";
            if (decodedText.includes('|')) {
                const parts = decodedText.split('|');
                name = parts[0];
                status = (parts[1] || "REGULAR").toUpperCase();
                kode = parts[2] || "QR";
            } else { name = decodedText; }

            overlay.className = "";
            overlay.style.display = "flex";
            resIcon.innerText = "✓";

            if (status.includes('VVIP')) overlay.classList.add('status-vvip');
            else if (status.includes('VIP')) overlay.classList.add('status-vip');
            else overlay.classList.add('status-reguler');

            resName.innerText = name;
            resStatus.innerText = status;

            // Audio Feedback
            playBeep(800, 0.2);
            speakWelcome(name, status);

            fetch(`${scriptURL}?type=absen&nama=${encodeURIComponent(name)}&status=${encodeURIComponent(status)}&kode=${encodeURIComponent(kode)}`)
                .catch(e => console.error(e));

            localStorage.removeItem('rekap_tamu');

            setTimeout(() => { 
                overlay.style.display = "none"; 
                isProcessing = false; 
            }, 4000);
        }

        function onScanFailure(msg) {
            if (isProcessing) return;
            isProcessing = true;
            overlay.className = "status-error";
            overlay.style.display = "flex";
            resIcon.innerText = "!";
            resName.innerText = "Error";
            resStatus.innerText = "INVALID";
            playBeep(200, 0.5);
            setTimeout(() => { overlay.style.display = "none"; isProcessing = false; }, 3000);
        }

        // Hardware Scanner Logic
        let buffer = "";
        let lastTime = Date.now();
        window.addEventListener('keydown', (e) => {
            unlockVoice();
            
            const now = Date.now();
            const indicator = document.getElementById('hwIndicator');
            if (now - lastTime > 100) buffer = ""; 
            if (e.key === "Enter") {
                if (buffer.length > 0) { 
                    onScanSuccess(buffer); 
                    buffer = ""; 
                }
            } else if (e.key.length === 1) {
                buffer += e.key;
                indicator.classList.add('hw-active');
                setTimeout(() => indicator.classList.remove('hw-active'), 400);
            }
            lastTime = now;
        });

        // Ensure voices are loaded for voice selection
        if (window.speechSynthesis.onvoiceschanged !== undefined) {
            window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
        }

        document.addEventListener('DOMContentLoaded', initCameraList);
    </script>
</body>
</html>
