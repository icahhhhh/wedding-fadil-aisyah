<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rekap Terkirim | Fadil & Aisyah</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #4a5d4a; --bg: #f4f1ee; --accent: #d4af37; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: #333; padding: 15px; margin: 0; }
        
        .container { 
            background: white; 
            max-width: 800px; 
            margin: 0 auto; 
            padding: 20px; 
            border-radius: 16px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.05); 
            border: 1px solid #e0e2db; 
            box-sizing: border-box; 
        }

        .header-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .btn-back {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: #eee;
            color: #555;
            text-decoration: none;
            padding: 8px 15px;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn-back:hover { background: #e0e0e0; color: #333; }

        h1 { font-family: 'Playfair Display', serif; font-size: 1.4rem; color: var(--primary); margin: 0; }
        
        .stat-banner {
            background: var(--primary);
            color: white;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            margin-bottom: 20px;
        }

        .stat-banner h2 { margin: 0; font-size: 2rem; }
        .stat-banner p { margin: 5px 0 0; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px; opacity: 0.8; }

        .loading { text-align: center; padding: 40px; color: #999; font-style: italic; font-size: 0.9rem; }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.85rem; }
        th { background: #f9f9f7; color: var(--primary); font-weight: 600; text-align: left; padding: 12px 10px; border-bottom: 2px solid #eee; }
        td { padding: 12px 10px; border-bottom: 1px solid #f0f0f0; vertical-align: top; }

        .badge-vip { background: var(--accent); color: white; padding: 2px 8px; border-radius: 50px; font-size: 10px; font-weight: bold; }
        .badge-reguler { background: #e0e0e0; color: #666; padding: 2px 8px; border-radius: 50px; font-size: 10px; font-weight: bold; }

        @media (max-width: 600px) {
            th:nth-child(3), td:nth-child(3) { display: none; }
            .container { padding: 15px; border-radius: 0; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-nav">
        <h1>Rekap Terkirim</h1>
        <a href="generator.html" class="btn-back">
            <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
            Kembali
        </a>
    </div>
    
    <div class="stat-banner">
        <h2 id="statTotal">0</h2>
        <p>Total Terkirim</p>
    </div>

    <div id="loading" class="loading">Memuat data dari database...</div>
    
    <div style="overflow-x: auto;">
        <table id="rekapTable" style="display:none;">
            <thead>
                <tr>
                    <th style="width: 30px;">#</th>
                    <th>Nama Tamu</th>
                    <th>Aksi</th>
                    <th>Tipe</th>
                </tr>
            </thead>
            <tbody id="rekapBody"></tbody>
        </table>
    </div>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbwsuDPy2rb0yf-2r0WyYUL6rSwIbMbxj5kp7fEpinXbQ9FkaXoQA5x_h0wUdwavAqhZvg/exec';

    async function loadRekap() {
        const loadingEl = document.getElementById('loading');
        const tableEl = document.getElementById('rekapTable');
        const bodyEl = document.getElementById('rekapBody');

        try {
            const response = await fetch(`${scriptURL}?type=get_list&v=${new Date().getTime()}`, {
                method: 'GET',
                redirect: 'follow'
            });

            if (!response.ok) throw new Error('Network response error');
            
            const rawData = await response.json();
            
            if (!Array.isArray(rawData)) {
                loadingEl.innerText = "Tidak ada data.";
                return;
            }

            // FILTER: Hilangkan nama ganda (Hanya ambil entri unik pertama kali ditemukan)
            const uniqueData = [];
            const seenNames = new Set();
            
            // Urutan aslinya data dari awal ke akhir, kita ambil yang paling baru (unik)
            rawData.slice().reverse().forEach(item => {
                const nameKey = (item.nama || "").trim().toLowerCase();
                if (nameKey && !seenNames.has(nameKey)) {
                    uniqueData.push(item);
                    seenNames.add(nameKey);
                }
            });

            // Update UI Stats
            document.getElementById('statTotal').innerText = uniqueData.length;

            loadingEl.style.display = 'none';
            tableEl.style.display = 'table';
            bodyEl.innerHTML = '';

            // Render baris tabel unik
            uniqueData.forEach((item, index) => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td style="color:#ccc;">${uniqueData.length - index}</td>
                    <td>
                        <div style="font-weight:600; color: var(--primary); text-transform: capitalize;">
                            ${item.nama || "Tanpa Nama"}
                        </div>
                        <div style="font-size:0.7rem; color:#999; margin-top:2px;">${item.waktu || ''}</div>
                    </td>
                    <td style="font-family: monospace; color:#666;">${item.wa || '-'}</td>
                    <td>
                        ${item.status === 'VIP' ? '<span class="badge-vip">VIP</span>' : '<span class="badge-reguler">REG</span>'}
                    </td>
                `;
                bodyEl.appendChild(tr);
            });

        } catch (error) {
            console.error('Error:', error);
            loadingEl.innerHTML = `<div style="color:#ef4444">Gagal memuat rekap.<br><small>${error.message}</small></div>`;
        }
    }

    document.addEventListener('DOMContentLoaded', loadRekap);
</script>

</body>
</html>
