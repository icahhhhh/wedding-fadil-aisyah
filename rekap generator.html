<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rekap Terkirim | Fadil & Aisyah</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #5c6351; --bg: #f4f5f0; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: #333; padding: 15px; margin: 0; }
        .container { background: white; max-width: 100%; margin: 0 auto; padding: 20px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border: 1px solid #e0e2db; box-sizing: border-box; }
        h1 { font-family: 'Playfair Display', serif; font-size: 1.5rem; color: var(--primary); text-align: center; }
        .btn-back { display: inline-block; margin-bottom: 20px; text-decoration: none; color: var(--primary); font-size: 0.8rem; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; font-size: 0.75rem; margin-top: 10px; }
        th { background: var(--primary); color: white; padding: 10px; text-align: left; text-transform: uppercase; }
        td { padding: 10px; border-bottom: 1px solid #eee; }
        .badge-vip { background: #d4a373; color: white; padding: 2px 5px; border-radius: 3px; font-size: 0.6rem; font-weight: bold; }
        .loading { text-align: center; padding: 20px; color: var(--primary); }

        /* === DUPLIKAT STYLES === */
        .badge-duplikat {
            background: #e74c3c;
            color: white;
            padding: 2px 5px;
            border-radius: 3px;
            font-size: 0.6rem;
            font-weight: bold;
            margin-left: 4px;
        }
        tr.row-duplikat td {
            background: #fff0f0;
        }
        .warning-duplikat {
            background: #fff3cd;
            border: 1px solid #ffc107;
            border-radius: 8px;
            padding: 12px 15px;
            margin: 10px 0;
            font-size: 0.8rem;
            color: #856404;
            display: none;
        }
        .warning-duplikat strong { display: block; margin-bottom: 5px; }
        .stat-bar {
            display: flex;
            gap: 10px;
            margin: 10px 0 15px 0;
            font-size: 0.75rem;
        }
        .stat-item {
            background: #f4f5f0;
            border-radius: 6px;
            padding: 8px 12px;
            flex: 1;
            text-align: center;
        }
        .stat-item strong { display: block; font-size: 1.1rem; color: var(--primary); }
        .stat-item.danger { background: #fff0f0; }
        .stat-item.danger strong { color: #e74c3c; }
    </style>
</head>
<body>

<div class="container">
    <a href="generator.html" class="btn-back">← KEMBALI KE GENERATOR</a>
    <h1>Rekap Undangan Terkirim</h1>

    <div id="loading" class="loading">Memuat data dari Sheets...</div>

    <div id="statBar" class="stat-bar" style="display:none;">
        <div class="stat-item">
            <strong id="statTotal">0</strong>
            Total Terkirim
        </div>
        <div class="stat-item">
            <strong id="statVIP">0</strong>
            VIP
        </div>
        <div class="stat-item danger" id="statDupBox">
            <strong id="statDuplikat">0</strong>
            Duplikat
        </div>
    </div>

    <div id="warningDuplikat" class="warning-duplikat">
        <strong>⚠️ Ditemukan nama duplikat di rekap:</strong>
        <span id="listDuplikat"></span>
    </div>

    <table id="rekapTable" style="display:none;">
        <thead>
            <tr>
                <th>#</th>
                <th>Nama</th>
                <th>WA</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody id="rekapBody"></tbody>
    </table>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbwsuDPy2rb0yf-2r0WyYUL6rSwIbMbxj5kp7fEpinXbQ9FkaXoQA5x_h0wUdwavAqhZvg/exec';

    async function loadRekap() {
        try {
            const response = await fetch(`${scriptURL}?type=get_list`);
            const data = await response.json();
            const body = document.getElementById('rekapBody');

            document.getElementById('loading').style.display = 'none';
            document.getElementById('rekapTable').style.display = 'table';
            document.getElementById('statBar').style.display = 'flex';

            // === DETEKSI DUPLIKAT ===
            const namaCount = {};
            data.forEach(item => {
                const key = item.nama.trim().toLowerCase();
                namaCount[key] = (namaCount[key] || 0) + 1;
            });

            const duplikatList = Object.keys(namaCount).filter(k => namaCount[k] > 1);

            // Statistik
            document.getElementById('statTotal').textContent = data.length;
            document.getElementById('statVIP').textContent = data.filter(i => i.status === 'VIP').length;
            document.getElementById('statDuplikat').textContent = duplikatList.length;

            // Tampilkan warning jika ada duplikat
            if (duplikatList.length > 0) {
                const warningEl = document.getElementById('warningDuplikat');
                warningEl.style.display = 'block';
                document.getElementById('listDuplikat').innerHTML = duplikatList.map(n =>
                    `<b style="text-transform:capitalize">${n}</b>`).join(', ');
            } else {
                document.getElementById('statDupBox').style.background = '#f4f5f0';
                document.getElementById('statDuplikat').style.color = 'var(--primary)';
            }

            // Render tabel
            data.forEach((item, i) => {
                const namaKey = item.nama.trim().toLowerCase();
                const isDup = namaCount[namaKey] > 1;

                const row = document.createElement('tr');
                if (isDup) row.classList.add('row-duplikat');

                row.innerHTML = `
                    <td style="color:#aaa; font-size:0.7rem;">${i + 1}</td>
                    <td>
                        <b>${item.nama}</b>
                        ${isDup ? '<span class="badge-duplikat">DUPLIKAT</span>' : ''}
                        <br><small style="color:#999">${item.waktu}</small>
                    </td>
                    <td>${item.wa}</td>
                    <td>${item.status === 'VIP' ? '<span class="badge-vip">VIP</span>' : 'Reguler'}</td>
                `;
                body.appendChild(row);
            });

        } catch (error) {
            document.getElementById('loading').innerText = "Gagal memuat data.";
        }
    }

    loadRekap();
</script>

</body>
</html>
